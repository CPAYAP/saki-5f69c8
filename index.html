<style>
:root{--pink:#e0457f;--blue:#4a90e2;--green:#37b24d;--teal:#16b7b0;--orange:#ff9f1c;--purple:#8a5cf6;--ink:#2b2b3a;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;font-family:"Hiragino Maru Gothic ProN","Hiragino Sans","Yu Gothic UI","Meiryo",system-ui,sans-serif;
color:var(--ink);background:linear-gradient(135deg,#ffe9f3,#e9f3ff 50%,#eafff0);min-height:100vh;}
.wrap{max-width:820px;margin:0 auto;padding:16px 14px 70px;}
.head{display:flex;align-items:center;gap:12px;margin-bottom:6px;}
.head .m{width:60px;height:60px;flex:0 0 60px;animation:bob 2.4s ease-in-out infinite;}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.head h1{margin:0;font-size:22px;color:#d6357f;text-shadow:1px 1px 0 #fff;}
.head h1 small{display:block;font-size:12px;color:#777;font-weight:normal;}
.crumbs{font-size:13px;color:#888;font-weight:700;margin:6px 2px 12px;}
.crumbs a{color:var(--blue);cursor:pointer;text-decoration:none;}
.dash{background:#fff;border-radius:18px;padding:14px 16px;margin:4px 0 16px;box-shadow:0 4px 14px rgba(90,90,160,.12);}
.dash .top{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:8px;}
.stat{background:#fff7ea;border:2px solid #ffe178;border-radius:12px;padding:6px 12px;font-weight:800;font-size:14px;color:#7a5b00;}
.dash h3{margin:6px 0 4px;font-size:14px;color:#555;}
.dash .today{font-size:13px;color:#444;line-height:1.6;}
.reco{display:flex;align-items:center;gap:10px;background:linear-gradient(135deg,#fff0f6,#eef5ff);border-radius:14px;padding:10px 12px;margin-top:8px;}
.reco .rb{margin-left:auto;border:none;border-radius:12px;padding:11px 16px;font-weight:800;color:#fff;background:var(--pink);cursor:pointer;font-size:15px;box-shadow:0 3px 0 rgba(0,0,0,.12);}
.reco .rb:active{transform:translateY(2px);}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:14px;}
.tile{border:none;border-radius:22px;padding:16px 12px;color:#fff;cursor:pointer;text-align:center;
box-shadow:0 6px 0 rgba(0,0,0,.12);transition:transform .12s;min-height:165px;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:3px;position:relative;}
.tile:hover{transform:translateY(-4px) rotate(-1deg);}
.tile:active{transform:translateY(3px);box-shadow:0 3px 0 rgba(0,0,0,.12);}
.tile .av{width:62px;height:62px;}.tile .n{font-size:20px;font-weight:800;}
.tile .s{font-size:11px;opacity:.95;font-weight:600;line-height:1.3;}
.tile .pg{position:absolute;top:8px;right:10px;background:#ffffff44;border-radius:10px;padding:2px 7px;font-size:11px;font-weight:800;}
.subjhead{display:flex;align-items:center;gap:12px;margin:4px 2px 12px;}
.subjhead .av{width:60px;height:60px;flex:0 0 60px;animation:bob 2.4s ease-in-out infinite;}
.subjhead .t{font-size:19px;font-weight:800;}
.units{display:flex;flex-direction:column;gap:10px;}
.unit{border:3px solid #eee;background:#fff;border-radius:16px;padding:14px 16px;font-size:16px;font-weight:800;cursor:pointer;
display:flex;justify-content:space-between;align-items:center;box-shadow:0 2px 0 rgba(0,0,0,.05);transition:transform .08s;gap:8px;}
.unit:hover{transform:translateX(4px);}
.unit .cnt{font-size:12px;color:#999;font-weight:700;white-space:nowrap;}
.unit .ok{color:var(--green);font-weight:800;font-size:13px;}
.panel{background:#fff;border-radius:20px;padding:16px;box-shadow:0 8px 24px rgba(90,90,160,.15);}
.modes{display:flex;gap:8px;margin-bottom:10px;}
.mode{flex:1;border:none;border-radius:12px;padding:11px;font-size:15px;font-weight:800;cursor:pointer;background:#eee;color:#777;}
.mode.on{color:#fff;}
.counter{text-align:center;color:#888;font-size:13px;font-weight:700;margin-bottom:6px;}
.card{border-radius:20px;padding:22px 18px;min-height:200px;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;
background:linear-gradient(160deg,#fff,#f7faff);border:3px solid #e7eefc;animation:cardin .3s;}
@keyframes cardin{from{transform:translateY(8px);opacity:.4}to{transform:translateY(0);opacity:1}}
.q{font-size:21px;font-weight:800;line-height:1.5;}
.a{font-size:22px;font-weight:800;margin-top:14px;display:none;line-height:1.5;}
.a.show{display:block;animation:pop .25s;}
.hintbox{display:none;margin-top:12px;background:#fff7e0;border:2px solid #ffd84a;border-radius:12px;padding:8px 12px;font-size:14px;color:#7a5b00;font-weight:700;line-height:1.4;}
.hintbox.show{display:block;animation:pop .25s;}
@keyframes pop{from{transform:scale(.7);opacity:0}to{transform:scale(1);opacity:1}}
.btns{display:flex;gap:10px;justify-content:center;margin-top:14px;flex-wrap:wrap;}
.btn{border:none;border-radius:14px;padding:13px 18px;font-size:16px;font-weight:800;cursor:pointer;color:#fff;box-shadow:0 4px 0 rgba(0,0,0,.12);}
.btn:active{transform:translateY(2px);box-shadow:0 2px 0 rgba(0,0,0,.12);}
.flip{background:var(--orange);}.speak{background:var(--blue);}.next{background:var(--pink);}.prev{background:#b9b9c9;}
.done{background:var(--green);}
.opts{display:flex;flex-direction:column;gap:10px;margin-top:14px;}
.opt{border:3px solid #e7e7f1;background:#fff;border-radius:14px;padding:13px;font-size:16px;font-weight:700;cursor:pointer;text-align:left;transition:transform .08s;}
.opt:active{transform:scale(.98);}
.opt.correct{border-color:var(--green);background:#e9fbef;animation:pop .3s;}
.opt.wrong{border-color:#ff6b6b;background:#ffeaea;animation:shake .4s;}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-7px)}75%{transform:translateX(7px)}}
.fb{text-align:center;font-size:18px;font-weight:900;min-height:24px;margin-top:10px;}
.backbtn{background:#fff;border:2px solid #ddd;border-radius:12px;padding:8px 14px;font-weight:800;color:#666;cursor:pointer;font-size:14px;}
.hint{text-align:center;font-size:12px;color:#aaa;margin-top:12px;}
.score{color:var(--green);font-weight:800;}.footer{text-align:center;font-size:11px;color:#bbb;margin-top:20px;}
.toast{position:fixed;left:50%;bottom:30px;transform:translateX(-50%);background:#2b2b3a;color:#fff;padding:12px 18px;border-radius:14px;font-weight:800;z-index:120;opacity:0;transition:opacity .2s;}
.toast.show{opacity:.95;}
.cv{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:99;}
.lvwrap{display:flex;align-items:center;gap:10px;margin:10px 0 2px;}
.lvbadge{background:linear-gradient(135deg,#ffd23f,#ff9f1c);color:#fff;font-weight:900;border-radius:12px;padding:6px 12px;font-size:15px;box-shadow:0 2px 0 rgba(0,0,0,.12);white-space:nowrap;}
.lvbar{flex:1;height:15px;background:#eee;border-radius:9px;overflow:hidden;box-shadow:inset 0 1px 2px rgba(0,0,0,.1);}
.lvbar>i{display:block;height:100%;background:linear-gradient(90deg,#ffe178,#ff9f1c);width:0;transition:width .6s cubic-bezier(.2,.8,.3,1);}
.lvtxt{font-size:11px;color:#999;font-weight:800;white-space:nowrap;}
.medalrow{margin-top:8px;}
.medalrow h3{margin:4px 0 4px;font-size:14px;color:#555;}
.medals{display:flex;flex-wrap:wrap;gap:7px;}
.medal{width:50px;height:50px;border-radius:13px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:21px;background:#f3f3f7;border:2px solid #eee;}
.medal.got{background:#fff7ea;border-color:#ffd84a;box-shadow:0 2px 0 rgba(255,170,0,.18);}
.medal.locked{filter:grayscale(1);opacity:.32;}
.medal .ml{font-size:8px;font-weight:800;color:#7a5b00;margin-top:1px;line-height:1.05;text-align:center;}
.explainbox{display:none;margin-top:12px;background:#eef6ff;border:2px solid #b9dbff;border-radius:12px;padding:11px 14px;font-size:14px;color:#23527a;font-weight:600;line-height:1.65;text-align:left;}
.explainbox.show{display:block;animation:pop .25s;}
.explain{background:var(--blue);}
.whybox{margin-top:10px;background:#eef6ff;border:2px solid #b9dbff;border-radius:12px;padding:10px 13px;font-size:14px;color:#23527a;font-weight:600;line-height:1.65;text-align:left;animation:pop .25s;}
.whybox b{color:#1c6fd0;}
.wrongbox{margin-top:10px;background:#fff0f0;border:2px solid #ffc2c2;border-radius:12px;padding:10px 13px;font-size:14px;color:#a33;font-weight:600;line-height:1.65;text-align:left;animation:pop .25s;}
.wrongbox b{color:#d6357f;font-size:15px;}
.stafuri{background:#fff;border-radius:18px;padding:14px 16px;margin:18px 0 0;box-shadow:0 4px 14px rgba(90,90,160,.12);}
.stafuri h2{margin:0 0 4px;font-size:17px;color:#d6357f;}
.stafuri .ssub{font-size:12px;color:#888;margin-bottom:10px;line-height:1.5;}
.stafuri .picks{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:10px;}
.stafuri .pk{border:2px solid #eee;background:#fff;border-radius:12px;padding:7px 11px;font-size:13px;font-weight:800;cursor:pointer;color:#555;}
.stafuri .vid{position:relative;width:100%;padding-top:56.25%;border-radius:14px;overflow:hidden;background:#000;}
.stafuri .vid iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:0;}
.stafuri .more{display:inline-block;margin-top:9px;font-size:12px;font-weight:800;color:#4a90e2;text-decoration:none;}
</style></head><body>

es, we are.","2人のこと→we"],["Is your textbook on your desk? にNoで答えると？","No, it isn't.","物→it"],["「1冊も知りません」 I ___ ___ any good books.","don't know","not＋any＝1つも〜ない"],["study と do の三単現は？","studies / does","yをiにして-es ／ -es"]]},{"name":"新中問 特訓（This/That・複数・命令文）","cards":[["「あれは私のかばんではありません。」を英語にすると？","That is not my bag.","「これ」= this、「あれ」= that だよ","「あれは」は遠くのものを指すので that を使います。「これは」なら this です。否定文は is のあとに not を入れます。That is not = That isn't。"],["「彼女は私の姉です。」を英語にすると？","She is my sister.","主語に使うのは She。Her は「彼女の」という意味だよ","「彼女は」は She で、主語として使います。Her は「彼女の」（所有格）や「彼女を/に」（目的格）で使います。sister は姉・妹、brother は兄・弟です。"],["「あなたは何冊の本を持っていますか。」を英語にすると？","How many books do you have?","数えられるもの → How many + 複数形の名詞","「何冊（いくつ）」は How many を使います。How many のあとの名詞は必ず複数形にします（books）。How much は数えられないものの量をたずねるときに使います。"],["「窓を開けなさい。」を英語にすると？","Open the window.","命令文は主語なし・動詞の原形で文を始めるよ","命令文は主語（You）を省略し、動詞の原形で始めます。「～しなさい」「～してください」という意味になります。Please をつけると丁寧になります：Please open the window."],["「ここで走ってはいけません。」を英語にすると？","Don't run here.","「～するな」= Don't + 動詞の原形","命令文の否定は文頭に Don't を置きます。Don't + 動詞の原形 で「～してはいけない」「～するな」の意味になります。Doesn't は三人称単数の否定で使うもので、命令文には使いません。"]]}]},{"id":"rika","name":"理科","sub":"1年：生物・物質・現象・大地","color":"#16b7b0","emoji":"🔬","units":[{"name":"① 生物の観察と分類","cards":[["顕微鏡の倍率の求め方は？","接眼レンズ×対物レンズ","10×40=400倍","顕微鏡の倍率は『接眼レンズの倍率 × 対物レンズの倍率』。例：接眼10倍×対物40倍＝400倍。かけ算するだけと覚えよう。"],["ルーペで手に持てる花を見るとき動かすのは？","観察するもの（ルーペは目に近づけ固定）","ルーペは目とセット","ルーペは必ず目に近づけて持つのが基本。手で持てる花などを見るときは“物の方”を前後に動かしてピントを合わせる（動かせない物のときは自分の顔ごと動かす）。"],["顕微鏡で最初に使う対物レンズは？","最も低倍率のもの","低→高の順","観察は必ず低倍率（いちばん短い対物レンズ）から始める。視野が広く目的のものを見つけやすいから。見つけてから高倍率に変える＝『低→高』。"],["プレパラートで気泡を防ぐカバーガラスのかけ方は？","片方からそっとおろす","空気を入れない","カバーガラスは端（片方）を液につけ、つまようじなどでゆっくり倒すようにおろす。こうすると空気（気泡）が入らずきれいなプレパラートになる。"],["花のつくりを外側から4つ","がく→花弁→おしべ→めしべ","が・か・お・め","外側から『がく→花弁（花びら）→おしべ→めしべ』の順。外がわが守る役、内がわが種をつくる役。頭文字で『が・か・お・め』と唱えよう。"],["おしべ・めしべの先を何という？","おしべ=やく、めしべ=柱頭","やくに花粉","おしべの先＝やく（中に花粉が入った袋）。めしべの先＝柱頭（花粉がつくところ、ねばねば）。『やくに花粉、柱頭で受けとる』。"],["めしべの根もとと中身は？","子房（中に胚珠）","子房→果実、胚珠→種子","めしべの根もとのふくらみ＝子房、その中の粒＝胚珠。受粉後に子房は果実、胚珠は種子になる。『しぼうは果実のもと、はいしゅは種のもと』。"],["受粉とは？","花粉がめしべの柱頭につくこと","受粉→種子・果実","受粉＝花粉がめしべの柱頭につくこと。受粉が起こると子房が果実に、胚珠が種子になり実ができる。"],["種子をつくる・つくらない植物は？","種子植物／胞子の植物(シダ・コケ)","種なし=胞子","花がさいて種子をつくる＝種子植物。花がなく胞子でふえる＝シダ植物・コケ植物。『種をつくらない＝胞子のなかま』。"],["胚珠が子房の中／むき出しは？","被子植物／裸子植物","裸でむき出し=裸子","胚珠が子房に包まれる＝被子植物（多くの花）。子房がなく胚珠がむき出し＝裸子植物（マツ・イチョウ・スギ）。『裸＝はだか＝むき出し』で裸子。"],["被子植物の2なかまは？","双子葉類・単子葉類","子葉が2枚／1枚","被子植物は、芽生えの子葉が2枚＝双子葉類、1枚＝単子葉類。アサガオは双子葉、イネ・ツユクサは単子葉。"],["双子葉類の根・葉脈は？","主根と側根・網状脈","単子葉=ひげ根・平行脈","双子葉類は根が『主根＋側根』、葉脈は『網状脈（あみ目）』。単子葉類は『ひげ根』『平行脈』。セットで対比して覚える。"],["コケ植物の根のようなものは？","仮根（体全体で水を吸う）","仮の根","コケ植物には本当の根がなく、体を地面に固定するだけの『仮根』がある。水は根からでなく体全体で吸う。"],["背骨のある・ない動物は？","脊椎動物／無脊椎動物","昆虫・貝は無脊椎","背骨がある動物＝脊椎動物、ない動物＝無脊椎動物。昆虫・エビ・貝・イカは背骨がないので無脊椎動物。"],["脊椎動物の5なかまは？","魚類・両生類・は虫類・鳥類・ほ乳類","魚両は鳥ほ","脊椎動物は『魚類・両生類・は虫類・鳥類・ほ乳類』の5つ。『ぎょ・りょう・は・ちょう・ほ』とリズムで覚えよう。"],["恒温動物・変温動物はどれ？","恒温=鳥類とほ乳類／変温=魚・両生・は虫","鳥とほ乳類だけあったか","まわりの温度が変わっても体温を一定に保てる＝恒温動物（鳥類・ほ乳類だけ）。体温が外気で変わる＝変温動物（魚・両生・は虫）。『あたたかいのは鳥とけもの』。"],["卵生・胎生はどれ？","胎生=ほ乳類のみ／ほかは卵生","ほ乳類だけ胎生","卵で生まれる＝卵生、母親の体内である程度育って生まれる＝胎生。胎生はほ乳類だけ、ほかは全部卵生。"],["体に節・外骨格をもつ無脊椎動物は？","節足動物（昆虫類・甲殻類）","節＋かたい殻","体やあしに節（ふし）があり、外側がかたい殻（外骨格）でおおわれる無脊椎動物＝節足動物（昆虫類・甲殻類・クモなど）。"],["イカ・貝のなかまは？","軟体動物（外とう膜）","やわらかい体","イカ・タコ・貝のように、体がやわらかく内臓を『外とう膜』が包む無脊椎動物＝軟体動物。"]]},{"name":"② 身のまわりの物質","cards":[["炭素をふくみ燃えるとCO₂が出る物質は？","有機物","炭を持つ","炭素を含み、燃やすと二酸化炭素（と水）が出る物質＝有機物。砂糖・デンプン・紙・プラスチックなど。『炭（炭素）を持つ＝有機物』。"],["有機物・無機物の例は？","有機物=砂糖・デンプン・プラ／無機物=食塩・金属・ガラス","","有機物＝砂糖・デンプン・エタノール・プラスチック（炭素を含む）。無機物＝食塩・金属・ガラス・水。炭を含むかで分ける。"],["金属に共通する性質を3つ","電気・熱を通す、みがくと光る、たたくとのびる","磁石は共通でない","金属に共通するのは『①電気・熱をよく通す ②みがくと光る（金属光沢）③たたくとのびる・広がる』。※磁石につくのは鉄など一部だけで共通ではない。"],["金属でない物質を何という？","非金属","","金属でない物質をまとめて非金属という（ガラス・プラスチック・木など）。"],["密度の式は？","質量÷体積（g/cm³）","水は1、小は浮く","密度＝質量÷体積（単位 g/cm³）。物質ごとに決まり、見分けの手がかりになる。水の密度は1で、これより小さい物は水に浮く。"],["上皿てんびん・電子てんびんではかるのは？","質量","","上皿てんびん・電子てんびんではかるのは『質量』（物の量そのもの）。重さ（重力の大きさ）はばねばかりではかる。"],["酸素の発生と性質は？","二酸化マンガン＋過酸化水素水／ものを燃やす","助燃性","酸素は『二酸化マンガンに過酸化水素水（オキシドール）を加える』と発生。性質はものを燃やすのを助ける（助燃性）で、火のついた線香が激しく燃える。"],["二酸化炭素の発生と確認は？","石灰石＋うすい塩酸／石灰水を白くにごす","白くにごる","二酸化炭素は『石灰石にうすい塩酸を加える』と発生。確認は石灰水に通すと白くにごる。"],["水素の性質は？","最も軽い・燃えてポンと音→水","軽い","水素はすべての気体の中でいちばん軽い。火を近づけると『ポンッ』と音を立てて燃え、水ができる。"],["アンモニアの性質と集め方は？","刺激臭・水によくとける→上方置換","軽い＆水にとける","アンモニアは鼻をつく刺激臭。とても水にとけやすく空気より軽いので、集め方は『上方置換法』。"],["気体の集め方3つは？","水上置換・上方置換・下方置換","とけにくい/軽い/重い","気体の集め方は『①水にとけにくい→水上置換 ②水にとけて空気より軽い→上方置換 ③水にとけて空気より重い→下方置換』。とけにくさと重さで決める。"],["水にとけたすきとおった液は？","水溶液","見えない・均一","物が水にとけて、すきとおって（透明）全体が均一になった液＝水溶液。色がついていても透明ならよい。"],["質量パーセント濃度の式は？","溶質÷溶液×100（%）","溶液=溶質＋水","濃度（％）＝溶質の質量÷溶液全体の質量×100。溶液＝溶質＋水（溶媒）。分母は『水』ではなく『液全体』なので注意。"],["とける最大量・とり出す方法は？","溶解度／再結晶","冷やしてとり出す","ある温度で水にとける最大量＝溶解度。とかした物を温度を下げる（または水を蒸発させる）と、結晶として取り出せる＝再結晶。"],["固体⇄液体⇄気体の変化は？","状態変化","質量は不変","固体⇄液体⇄気体と、温度によって姿が変わること＝状態変化。物質そのものは変わらず、別の物質にはならない。"],["状態変化で変わる・変わらないものは？","体積は変わる・質量は不変","水→氷は体積増","状態変化では『体積は変わるが質量は変わらない』。ふつう固体→液体→気体で体積は大きくなる。※水だけ例外で氷（固体）の方が体積が大きい。"],["液体が沸騰する温度・とける温度は？","沸点・融点","純物質では一定","液体が沸騰して気体になる温度＝沸点、固体がとけて液体になる温度＝融点。純粋な物質では決まった温度で一定になる。"]]},{"name":"③ 身のまわりの現象（光・音・力）","cards":[["光の反射で入射角と反射角は？","等しい（反射の法則）","入った角=返る角","光が鏡などではね返るとき、入ってくる角（入射角）とはね返る角（反射角）は必ず等しい＝反射の法則。"],["光が水・ガラスで曲がる現象は？","屈折","ストローが曲がる","光が水やガラスなど別の物質に入るとき、境目で進む向きが曲がる＝屈折。水中のストローが折れて見えるのはこのため。"],["水中→空気で全部反射する現象は？","全反射","光ファイバー","水中（やガラス）から空気へ出ようとして角度が大きいと、外へ出ずに全部はね返る＝全反射。光ファイバーに利用されている。"],["凸レンズで遠い物体の像は？","上下左右が逆の実像","スクリーンにうつる","凸レンズで物体が焦点より遠いと、上下左右が逆向きの『実像』ができ、スクリーンにうつせる。"],["凸レンズで近すぎる物体の像は？","拡大した虚像（同じ向き）","ルーペ","物体が焦点より内側（近すぎ）にあると実像はできず、物体より大きく同じ向きの『虚像』が見える（虫めがねの見え方）。"],["焦点距離の2倍の位置の像は？","実物と同じ大きさの実像","","物体を焦点距離の2倍の位置に置くと、反対側の焦点距離2倍の位置に、実物と同じ大きさの実像ができる。"],["音の高さ・大きさは何で決まる？","高さ=振動数、大きさ=振幅","Hz=振動数","音の高さは『振動数（1秒間の振動回数・単位Hz）』で決まり多いほど高い。音の大きさは『振幅（ゆれの大きさ）』で決まり大きいほど大きい。"],["空気中の音の速さは約？","約340m/s","光より遅い","空気中の音の速さは約340m/s。光（約30万km/s）よりずっと遅いので、いなずまは光ってから音が遅れて聞こえる。"],["力のはたらき3つは？","形を変える・動きを変える・支える","","力には『①物の形を変える ②物の動き（速さ・向き）を変える ③物を支える』の3つのはたらきがある。"],["力の大きさの単位は？","ニュートン（N）","100gの重力≒1N","力の大きさの単位はニュートン（記号N）。約100gの物にはたらく重力がおよそ1N。"],["ばねののびと力の関係は？","比例（フックの法則）","のび∝力","ばねののびは、加えた力の大きさに比例する＝フックの法則。力を2倍にすればのびも2倍。"],["質量と重さのちがいは？","質量=不変／重さ=重力で変わる","月で重さ1/6","質量は物の量そのもので場所が変わっても不変（g・kg）。重さは重力の大きさで場所により変わる（N）。月は重力1/6なので重さも1/6（質量は同じ）。"],["2力のつり合いの条件は？","大きさ等しい・向き反対・一直線上","同大逆向き一直線","1つの物にはたらく2力がつり合う条件は『①大きさが等しい ②向きが反対 ③同じ一直線上』の3つ。"]]},{"name":"④ 大地の変化","cards":[["マグマが地表に出たものは？","溶岩","地下=マグマ","マグマ（地下の高温でどろどろの岩石）が地表に出たもの＝溶岩。『地下＝マグマ、地表＝溶岩』。"],["マグマが冷えてできた岩石は？","火成岩","火山岩＋深成岩","マグマが冷えて固まった岩石＝火成岩。冷え方のちがいで火山岩と深成岩に分かれる。"],["急冷・ゆっくり冷えた火成岩は？","火山岩／深成岩","深成岩は等粒状(大結晶)","地表近くで急に冷える＝火山岩（小さな結晶の中に大きな結晶＝斑状組織）。地下深くでゆっくり冷える＝深成岩（大きな結晶がそろう＝等粒状組織）。"],["火山岩・深成岩の代表は？","玄武岩・流紋岩／花こう岩","","火山岩の代表は玄武岩（黒）・流紋岩（白）など。深成岩の代表は花こう岩（みかげ石）など。"],["無色鉱物・有色鉱物の例は？","セキエイ・チョウ石／クロウンモ・カクセン石","","無色（白っぽい）鉱物＝セキエイ・チョウ石。有色（黒っぽい）鉱物＝クロウンモ・カクセン石・キ石。色で区別すると覚えやすい。"],["地震の最初と後のゆれは？","初期微動(P波)→主要動(S波)","P速い・S遅い","地震ではまず小さなゆれ『初期微動』（速いP波）が来て、あとから大きなゆれ『主要動』（遅いS波）が来る。P波が先、S波が後。"],["震源と震央のちがいは？","震源=地下の点／震央=真上の地表","源は地下、央は真上","地下で地震が起こった場所＝震源、その真上の地表の点＝震央。『源は地下、央は真上』。"],["ゆれの大きさ・地震の規模は？","震度／マグニチュード","震度0〜7","各地のゆれの大きさ＝震度（0〜7の10段階）。地震そのものの規模＝マグニチュード（M）。場所で変わるのが震度、地震ごとに1つなのがM。"],["初期微動継続時間が長いほど震源は？","遠い","P-S時間が長い","初期微動継続時間（P波とS波の到着の差）が長いほど、震源から遠い。差が大きい＝遠い。"],["地層をつくるはたらきの順は？","風化→侵食→運搬→堆積","ふう・しん・うん・たい","地層は『風化→侵食→運搬→堆積』の順でできる。岩がもろくなり、けずられ、運ばれ、積もる。『ふう・しん・うん・たい』。"],["地層が固まった岩石は？","堆積岩(れき岩・砂岩・泥岩)","れき＞砂＞泥","積もった土砂が固まった岩石＝堆積岩。粒の大きい順に れき岩＞砂岩＞泥岩。"],["生物の死がいなどが固まった岩石は？","石灰岩・チャート","石灰岩は塩酸でCO₂","生物の死がいなどが固まった堆積岩＝石灰岩（貝・サンゴ由来、塩酸でCO₂が出る）やチャート（とても硬い）。"],["環境・時代がわかる化石は？","示相化石／示準化石","相=環境、準=時代","当時の環境がわかる化石＝示相化石（例：サンゴ→あたたかく浅い海）。時代がわかる化石＝示準化石（例：アンモナイト→中生代）。『相＝環境、準＝時代』。"],["地層の広がりの手がかりの層は？","かぎ層（火山灰など）","目印の層","火山灰の層など、特徴的で広い範囲に同時にできた層＝かぎ層。離れた地層を比べる『目印』になる。"],["プレートの動きで起こるものは？","地震・火山・大地の変動","日本は4枚の境界","プレート（地球表面をおおう岩盤）が動くことで地震・火山・大地の変動が起こる。日本は4枚のプレートの境界にあるため地震が多い。"]]},{"name":"⑤ 塾の特訓（観点と基準・実験操作）","cards":[["生物を分類するときの「観点」と「基準」って何？","観点＝注目する特徴（動き・食べ物など）、基準＝分けるものさし（歩く/泳ぐ など）","観点で見て、基準で分ける","観点＝『どこに注目して見るか』（動き・食べ物・すみかなど）。基準＝『その観点でどう分けるか（ものさし）』（歩く/泳ぐ/とぶ など）。観点で見て、基準で仲間分けする。"],["「虫・鳥・魚」を観点に使ってはいけないのはなぜ？","それはもう分けたあとの“グループ名”だから（理由が一周してしまう）","グループ名は観点にできない","『虫・鳥・魚』はもう分けたあとのグループ名。観点にすると『虫だから虫』と一周してしまい、分ける理由にならない。だから観点には使えない。"],["観点や基準を変えると、分類はどうなる？","仲間分けのされ方（結果）が変わる","見る所が変われば分け方も変わる","注目する観点や分ける基準を変えると、同じ生き物でも仲間分けの結果が変わる。『すみか』で分けるか『食べ物』で分けるかでグループが入れかわる。"],["マツの花で、花粉が入っている部分は？","雄花のりん片にある「花粉のう」","マツは雄花と雌花に分かれる","マツは花弁のない花で、雄花と雌花に分かれている。花粉は雄花のりん片にある『花粉のう』に入っている。"],["マツに花弁やがくはある？種子のでき方は？","花弁・がくはない。胚珠がむき出しで受粉して種子になる（裸子植物）","裸子＝胚珠むき出し","マツには花弁やがくがない。胚珠がむき出しのまま受粉して種子になる。これが裸子植物の特徴。"],["受粉のあと、子房と胚珠はそれぞれ何になる？","子房→果実、胚珠→種子","しぼう→かじつ、はいしゅ→たね","受粉のあと、子房は果実に、胚珠は種子になる。『しぼう→かじつ、はいしゅ→たね』とセットで覚える。"],["被子植物と裸子植物のちがいは？","被子＝胚珠が子房に包まれる／裸子＝子房がなく胚珠がむき出し","被＝つつむ、裸＝はだか","胚珠が子房に包まれる＝被子植物、子房がなく胚珠がむき出し＝裸子植物。『被＝つつむ、裸＝はだか』。"],["双子葉類で、花弁がくっつく/離れるなかまの名前は？","くっつく＝合弁花類、離れる＝離弁花類","合＝くっつく、離＝はなれる","双子葉類のうち、花弁がくっつく＝合弁花類（アサガオ・タンポポ）、1枚ずつ離れる＝離弁花類（アブラナ・サクラ）。"],["BTB溶液の色：酸性・中性・アルカリ性は？","酸性＝黄、中性＝緑、アルカリ性＝青","黄→緑→青（酸→アルカリ）","BTB溶液は液性で色が変わる。酸性＝黄、中性＝緑、アルカリ性＝青。『黄→緑→青』が酸→中→アルカリの順。"],["リトマス紙：酸性とアルカリ性の変化は？","酸性＝青→赤、アルカリ性＝赤→青","“酸っぱい”と青が赤くなる","酸性は青色リトマス紙を赤に変える（青→赤）。アルカリ性は赤色リトマス紙を青に変える（赤→青）。『酸は青を赤に』。"],["アンモニア水のにおいを漢字3字で？","刺激臭","ツンとくるにおい","アンモニアは鼻にツンとくる『刺激臭』。塩酸なども刺激臭。"],["水溶液に硝酸銀水溶液を入れると白くにごった。何が含まれる？","塩化物（塩分）が含まれている","白いにごり＝塩素のなかま","水に硝酸銀水溶液を入れて白くにごったら、その水には塩化物（塩素のなかま＝塩分）がふくまれている。"],["パックテストでアンモニアが多い水。飲める？飲めない？","飲めない（アンモニアが多く水がよごれているから）","アンモニア多い＝×","パックテストでアンモニアが多く出た水は、生活排水などでよごれているので飲めない。アンモニアが多い＝水質が悪い。"],["ろ過のしかた：ろ紙・ガラス棒・ろうとの足のポイントは？","ろ紙は4つ折り、液はガラス棒を伝わらせて注ぐ、ろうとの足はビーカーの内壁につける","液をはねさせない工夫","ろ過のコツは『①ろ紙は4つ折り ②液はガラス棒を伝わらせて静かに注ぐ ③ろうとの足の長い方をビーカーの内壁につける』。液をはねさせない工夫。"],["ろ過で分けられるのは何と何？","とけているもの（ろ紙を通る＝ろ液）と、とけ残り（ろ紙に残る）","ろ液＝通りぬけた液","ろ過では『とけているもの（ろ紙を通りぬける＝ろ液）』と『とけ残り（ろ紙に残る固体）』を分けられる。"],["ガスバーナーの上・下のねじの名前は？","上＝空気調節ねじ、下＝ガス調節ねじ","空気が上、ガスが下","ガスバーナーは上が『空気調節ねじ』、下が『ガス調節ねじ』。『上＝空気、下＝ガス』。"],["炎がオレンジ色。青い炎にするには？","空気調節ねじを開いて空気を増やす","空気不足＝オレンジ色","炎がオレンジ（赤）色なのは空気不足のサイン。空気調節ねじを開いて空気を増やすと、よく燃える青い炎になる。"],["ガスバーナーの点火順序は？","元栓→コック→マッチに火→ガス調節ねじで点火→空気調節ねじで青く","火をつけてから空気を入れる","点火は①元栓→②コック→③マッチに火→④ガス調節ねじをゆるめて点火→⑤空気調節ねじを開いて青い炎、の順。『火をつけてから空気』が大事。"],["有機物と無機物のちがい、燃やすとどうなる？","有機物＝炭素を含み燃えると黒く焦げてCO₂が出る／無機物は燃えない","砂糖は有機物、食塩は無機物","有機物は炭素を含むので燃やすと黒く焦げて二酸化炭素が出る。無機物（食塩・金属など）は燃えない。砂糖は有機物、食塩は無機物。"],["白い粉にヨウ素液をかけたら青紫色。その粉は？","デンプン（片栗粉）","ヨウ素＋デンプン＝青紫","白い粉にヨウ素液をかけて青紫色になったら、それはデンプン。『ヨウ素＋デンプン＝青紫』はデンプンの検出反応。"]]},{"name":"新中問 特訓（気体・密度・状態変化）","cards":[["水に溶けにくく、空気より軽い気体を集めるのに最も適した方法は？","上方置換法","軽い気体は上に行く→上で集める","空気より軽い気体（水素・アンモニアなど）は上に集まるので上方置換法が適しています。水上置換法は水に溶けにくい気体全般に使え、純粋な気体が集められます。下方置換法は空気より重い気体に使います。"],["二酸化マンガンにうすい過酸化水素水（オキシドール）を加えると発生する気体は？","酸素","二酸化マンガンは分解を助ける「触媒」の役割。ものを燃やす気体だよ","二酸化マンガンは触媒として働き、過酸化水素水の分解を促進して酸素が発生します。酸素はものを燃やす働き（助燃性）があり、火のついた線香を入れると激しく燃えます。"],["質量54g、体積20cm³の物質の密度は？","2.7 g/cm³","密度 = 質量 ÷ 体積 で計算しよう","密度 = 質量 ÷ 体積 = 54g ÷ 20cm³ = 2.7 g/cm³。この密度はアルミニウムの密度に近いです。密度は物質の種類によって決まっているので、物質を見分ける手がかりになります。"],["物質が液体から気体に変わることを何という？","蒸発（気化）","液体が気体になるのは、水がお湯になって湯気が出るイメージ","液体→気体は蒸発（気化）です。固体→液体は融解、液体→固体は凝固、固体→気体（直接）は昇華といいます。状態変化しても物質そのものは変わらず、質量も変わりません。"],["状態変化について正しいものはどれ？（状態変化すると質量が変わる／状態変化すると体積が変わる／固体→液体の変化では体積が必ず小さくなる／状態変化すると別の物質になる）","状態変化すると体積が変わる","質量は変化しないけど、体積はどうなる？","状態変化では質量は変わりませんが、体積は変わります。一般的に固体→液体→気体と体積は大きくなります。ただし水は例外で、固体（氷）のほうが液体（水）より体積が大きいです。状態変化は物質そのものは変わらない変化です。"]]}]},{"id":"sugaku","name":"数学","sub":"1年：正負の数〜図形・データ・例題","color":"#37b24d","emoji":"➗","units":[{"name":"📐 毎日数学チャレンジ（コツ・音声つき）","link":"suugaku.html","cards":[]},{"name":"① 正の数・負の数","cards":[["素数とは？","1と自分しか約数がない2以上の整数","1は素数でない"],["素因数分解とは？","自然数を素数の積で表すこと","12=2²×3"],["18を素因数分解すると？","2×3²",""],["絶対値とは？","原点からの距離","符号をとった数"],["数の大小：-3と-5 大きいのは？","-3","数直線で右が大"],["(+5)+(-8)＝?","-3","異符号は差・大きい方の符号"],["(-7)-(-2)＝?","-5","-(-)は+。-7+2"],["(-4)×(-3)＝?","+12","負×負=正"],["(-12)÷(+4)＝?","-3","異符号は負"],["(-2)³＝?","-8","負の奇数乗は負"],["ひき算 a−b を計算しやすく直すと？","a＋(−b)（＋反対の数にする）","ひき算は迷わず「＋反対」に書きかえる"],["3−(−14) を計算","17","−(−)は＋。3＋14＝17。★−11にしないよう注意！"],["−2² と (−2)² のちがいは？","−2²＝−(2×2)＝−4／(−2)²＝(−2)×(−2)＝4","★カッコがあれば中身ごと、なければ数字だけ"],["かけ算・わり算の符号の決め方は？","マイナスの個数が偶数→＋、奇数→−","個数で決まる"],["逆数とは？ 求め方は？","かけて1になる数。分子と分母を入れかえる（符号はそのまま） ではありません。2は最も小さい素数で、唯一の偶数の素数です。"],["60を素因数分解すると？","2² × 3 × 5","小さい素数（2, 3, 5...）で順に割っていこう","60 ÷ 2 = 30、30 ÷ 2 = 15、15 ÷ 3 = 5、5 ÷ 5 = 1。よって 60 = 2 × 2 × 3 × 5 = 2² × 3 × 5。Cの「10」やDの「4」「15」は素数ではないので不正解。"],["方程式 3x - 7 = 8 の解は？","x = 5","まず -7 を右辺に移項（符号を変えて）してみよう","3x - 7 = 8 → 3x = 8 + 7 → 3x = 15 → x = 15 ÷ 3 = 5。移項するときは符号が変わることに注意！ -7 を右辺に移項すると +7 になります。"],["方程式 2(x - 3) = x + 1 の解は？","x = 7","まずカッコを外して（分配法則）、それからxの項と数の項を左右に分けよう","まず左辺のカッコを外す：2x - 6 = x + 1。xの項を左辺に、数の項を右辺に移項：2x - x = 1 + 6。よって x = 7。"],["1本80円のえんぴつを何本か買い、500円出したらおつりが100円だった。えんぴつは何本買った？（方程式を立てて解く問題）","5本","「代金 + おつり = 出したお金」で式を立てよう","えんぴつの本数を x とすると、80x + 100 = 500（代金 + おつり = 出した金額）。80x = 400、x = 5。検算：80 × 5 = 400円、500 - 400 = 100円（おつり）で合っている。"]]}]},{"id":"shakai","name":"社会","sub":"歴史1・地理1","color":"#ff9f1c","emoji":"🗺️","units":[{"name":"歴史① 古代までの日本","cards":[["人類の進化の順は？","猿人→原人→新人","新人が直接の祖先","人類は『猿人→原人→新人』の順に進化した。新人（ホモ・サピエンス）が今の人類の直接の祖先。古い順に さるに近い→新しい。"],["旧石器→新石器、道具は？","打製石器→磨製石器","打ち欠く→みがく","旧石器時代は石を打ち欠いた『打製石器』、新石器時代は石をみがいた『磨製石器』。『打って作る→みがいて作る』の進化。"],["世界四大文明は？","エジプト・メソポタミア・インダス・中国","大河の流域","エジプト・メソポタミア・インダス・中国（黄河）の4つ。すべて大きな川の流域で、農業に適し人が集まって生まれた。"],["メソポタミア文明の法典は？","ハンムラビ法典","目には目を","メソポタミア文明（チグリス・ユーフラテス川）の法律＝ハンムラビ法典。『目には目を』で有名。"],["中国を統一した王朝は？","秦（始皇帝）","万里の長城","紀元前3世紀に中国を初めて統一したのが秦。王の始皇帝は北方の敵を防ぐため万里の長城を整えた。"],["縄文・弥生のちがいは？","縄文=狩り採集／弥生=稲作","弥生で米→くに","縄文時代は狩り・漁・採集（縄文土器）。弥生時代は大陸から稲作が伝わり、米づくりで定住しむらができた（弥生土器）。"],["邪馬台国の女王は？","卑弥呼","魏に使い→親魏倭王","3世紀ごろの邪馬台国の女王＝卑弥呼。中国の魏に使いを送り『親魏倭王』の称号を授かったと『魏志』倭人伝にある。"],["大和政権の王の墓は？","古墳(前方後円墳)","渡来人が技術を伝える","大和政権（大王）の墓は大きな『古墳』。とくに鍵あな形の前方後円墳が有名。渡来人が大陸の技術を伝えた。"],["聖徳太子の政策2つは？","冠位十二階・十七条の憲法","遣隋使に小野妹子","聖徳太子は能力で役人を選ぶ『冠位十二階』と、役人の心構えを示す『十七条の憲法』を定めた。遣隋使（小野妹子）も送った。"],["645年の改革は？","大化の改新","蒸し米(645)で大化","645年、中大兄皇子らが蘇我氏をたおして始めた改革＝大化の改新。『蒸し米（645）で大化の改新』。天皇中心の国づくりへ。"],["701年の律令は？","大宝律令","律=刑罰、令=きまり","701年に定められた律令＝大宝律令。律＝刑罰のきまり、令＝政治のきまり。律令国家のしくみが整った。"],["710年・794年の都は？","平城京・平安京","なんと(710)／鳴くよ(794)","710年＝平城京（奈良）、794年＝平安京（京都）。『なんと（710）立派な平城京』『鳴くよ（794）うぐいす平安京』。"],["奈良時代の文化・歴史書は？","天平文化／古事記・日本書紀","東大寺大仏・正倉院","奈良時代は遣唐使が伝えた国際色ゆたかな『天平文化』。東大寺の大仏・正倉院が代表。歴史書『古事記』『日本書紀』もできた。"],["平安の摂関政治の一族・全盛は？","藤原氏（藤原道長）","むすめを天皇のきさきに","平安時代、娘を天皇のきさきにして力をもったのが藤原氏。全盛は藤原道長。摂政・関白として政治を動かした＝摂関政治。"],["国風文化の作品は？","源氏物語(紫式部)・枕草子(清少納言)","かな文字","遣唐使停止後に生まれた日本風の『国風文化』。かな文字で『源氏物語』（紫式部）や『枕草子』（清少納言）が書かれた。"]]},{"name":"歴史② 中世（鎌倉・室町）","cards":[["源頼朝が開いた幕府は？","鎌倉幕府(1185年ごろ)","いい箱(1185)つくろう","源頼朝が開いた武士の政権＝鎌倉幕府（1185年ごろ）。『いい箱（1185）つくろう鎌倉幕府』。"],["将軍と御家人の関係は？","御恩と奉公","土地で結ぶ主従","将軍は御家人に領地を保護・あたえ（御恩）、御家人は戦いで奉仕する（奉公）。土地を仲立ちにした主従関係＝御恩と奉公。"],["将軍を補佐する役職は？","執権(北条氏)","執権政治","鎌倉幕府で将軍を補佐する役職＝執権。北条氏が代々務め実権をにぎった（執権政治）。"],["1221年の戦いは？","承久の乱(後鳥羽上皇)","幕府勝利→西国へ","1221年、後鳥羽上皇が幕府をたおそうと起こした戦い＝承久の乱。幕府が勝ち、西国にも支配を広げた。"],["1232年の武士の法は？","御成敗式目(貞永式目)","武士初の法律","1232年、北条泰時が定めた武士初の法律＝御成敗式目（貞永式目）。武士の慣習をまとめた裁判の基準。"],["鎌倉新仏教の例は？","浄土宗(法然)・浄土真宗(親鸞)・禅宗","わかりやすい教え","民衆にわかりやすく広まった鎌倉新仏教。浄土宗（法然）・浄土真宗（親鸞）・禅宗など。念仏や座禅で誰でも救われると説いた。"],["元の襲来は？","元寇(文永1274・弘安1281)","暴風雨で元軍退く","元（モンゴル）が2度せめてきた＝元寇（文永の役1274・弘安の役1281）。暴風雨もあって元軍は引きあげた。"],["建武の新政を行った天皇は？","後醍醐天皇","武士の不満→失敗","鎌倉幕府をほろぼし天皇中心の政治を始めたのが後醍醐天皇＝建武の新政。武士の不満で2年ほどで失敗した。"],["足利義満の対中国貿易は？","日明(勘合)貿易","勘合で倭寇と区別","足利義満が始めた中国（明）との貿易＝日明（勘合）貿易。正式な船と倭寇を区別するため『勘合』という合い札を使った。"],["1467年の乱は？","応仁の乱","人の世むなしい(1467)→戦国","1467年、将軍のあとつぎ争いなどから起きた大乱＝応仁の乱。『人の世むなしい（1467）応仁の乱』。これ以後、戦国時代へ。"],["室町文化の代表は？","金閣・銀閣／水墨画(雪舟)","義満=金、義政=銀","室町文化は金閣（足利義満）と銀閣（足利義政）が代表。銀閣の書院造は今の和室のもと。雪舟が水墨画を大成。"],["民衆が結んで起こした抵抗は？","一揆（土一揆など）","団結して要求","農民らが団結して借金帳消しや要求を求めた行動＝一揆（土一揆・一向一揆など）。力を合わせて支配に立ち向かった。"]]},{"name":"歴史③ 近世のはじまり","cards":[["14〜16世紀の文芸復興は？","ルネサンス","古代を見直す","14〜16世紀、古代ギリシャ・ローマの文化を見直す動き＝ルネサンス（文芸復興）。イタリアから始まった。"],["宗教改革を始めた人物は？","ルター","プロテスタント","16世紀、カトリック教会を批判して改革を始めたのがルター。この流れがプロテスタント（新教）。"],["大航海時代の3人は？","コロンブス・バスコダガマ・マゼラン船隊","コロンブス1492","コロンブス（アメリカ近くに到達）・バスコ＝ダ＝ガマ（インド航路）・マゼラン船隊（世界一周）。新航路を開いた。"],["コロンブスの到達・マゼランの業績は？","アメリカ近く／世界一周","","コロンブスは1492年に大西洋を渡りアメリカ近くの島に到達。マゼランの船隊は史上初めて世界一周を達成（地球が丸い証明）。"],["鉄砲・キリスト教の伝来年は？","鉄砲1543・キリスト教1549","以後よさん／以後よく","鉄砲1543年、キリスト教1549年に伝来。『以後よさん（1543）鉄砲、以後よく（1549）広まるキリスト教』。"],["鉄砲が伝わった場所・キリスト教を伝えた人は？","種子島／ザビエル","","鉄砲は種子島（鹿児島）にポルトガル人が伝えた。キリスト教はイエズス会のフランシスコ＝ザビエルが伝えた。"],["織田信長の政策は？","楽市・楽座／長篠で鉄砲","桶狭間→長篠","織田信長は市の税をなくし商売を自由にする『楽市・楽座』を行い、長篠の戦いで鉄砲を活用して武田軍を破った。"],["豊臣秀吉の2政策は？","検地と刀狩","兵農分離","豊臣秀吉は田畑を測る『検地（太閤検地）』と農民の武器を取り上げる『刀狩』を行った。武士と農民を分ける兵農分離が進んだ。"],["検地で土地の生産力を表すものは？","石高","年貢の基準","検地で土地の生産力を米の量で表したもの＝石高。年貢（税）の基準になった。"],["桃山文化の特徴は？","豪華・雄大（天守・障壁画）","千利休のわび茶","信長・秀吉のころの豪華で雄大な文化＝桃山文化。大きな天守の城や金色の障壁画が特徴。千利休がわび茶を完成。"]]},{"name":"地理① 世界と日本の地域構成","cards":[["六大陸は？","ユーラシア・アフリカ・北アメリカ・南アメリカ・南極・オーストラリア","最大はユーラシア","ユーラシア・アフリカ・北アメリカ・南アメリカ・南極・オーストラリアの6つ。最大はユーラシア、最小はオーストラリア。"],["三大洋は？","太平洋・大西洋・インド洋","最大は太平洋","太平洋・大西洋・インド洋の3つ。いちばん広いのは太平洋。"],["緯度0度・経度0度は？","赤道・本初子午線","本初子午線=ロンドン","緯度0度の線＝赤道（地球を南北に2分）。経度0度の線＝本初子午線（ロンドンを通る）。この2本が位置の基準。"],["緯線・経線とは？","横に引く=緯線／たてに引く=経線","","赤道に平行な横の線＝緯線、北極と南極を結ぶ縦の線＝経線。緯線と経線の交点で位置を表す。"],["時差の決まりは？","経度15度で1時間","東へ進むと進む","地球は24時間で1回転（360度）するので、経度15度ごとに1時間の時差ができる（360÷24＝15）。"],["日本の標準時の経線は？","東経135度(明石市)","135÷15=9時間","日本が基準にする経線（標準時子午線）＝東経135度。兵庫県明石市を通る。"],["日付を調整する線は？","日付変更線","ほぼ経度180度","ほぼ経度180度に引かれ、日付を1日ずらす線＝日付変更線。西から東へこえると1日もどす。"],["国の主権がおよぶ範囲3つは？","領土・領海・領空","領海12海里","国の主権がおよぶ領域＝領土（陸）・領海（沿岸の海）・領空（その上空）の3つ。"],["漁業・資源の権利がある海域は？","排他的経済水域(200海里)","領海の外〜200海里","領海の外側、沿岸から200海里以内の海＝排他的経済水域（EEZ）。魚や鉱産資源を自国のものにできる。"],["日本の都道府県の数は？","47","1都1道2府43県","日本の都道府県は全部で47（1都＝東京、1道＝北海道、2府＝大阪・京都、43県）。"],["世界をおおまかに分けると（州）？","アジア・ヨーロッパ・アフリカ・北南アメリカ・オセアニア","6つの州","世界はアジア・ヨーロッパ・アフリカ・北アメリカ・南アメリカ・オセアニアの6つの州に分けられる。"]]},{"name":"地理② 世界の人々と諸地域","cards":[["世界の気候帯5つは？","熱帯・乾燥帯・温帯・亜寒帯・寒帯","赤道→極へ","赤道から極へ 熱帯→乾燥帯→温帯→亜寒帯（冷帯）→寒帯 と変化する5つの気候帯。"],["三大宗教は？","キリスト教・イスラム教・仏教","イスラムは豚×・断食","世界中に広がった三大宗教＝キリスト教・イスラム教・仏教。信者数が多く、民族をこえて広まった。"],["アジアの季節風は？","モンスーン","夏は雨、冬は乾燥","季節によって向きが変わる風＝モンスーン（季節風）。夏は海から湿った風で雨が多く、冬は大陸から乾いた風。"],["中国のかつての人口政策は？","一人っ子政策","沿海部で工業発展","人口の増えすぎをおさえるため夫婦の子を1人にした政策＝一人っ子政策（現在は廃止）。沿海部で工業が発展した。"],["東南アジアの地域組織は？","ASEAN","プランテーション農業","東南アジアの国々が経済協力する組織＝ASEAN（東南アジア諸国連合）。プランテーション農業がさかん。"],["インドで発展した産業は？","ICT(情報通信)産業","英語と数学に強い","インドで発展したのはICT（情報通信技術）産業。英語が使え数学に強く、時差を生かしてアメリカの仕事を請け負う。"],["西アジアの資源と組織は？","石油／OPEC","ペルシャ湾岸","西アジア（ペルシャ湾岸）は石油が豊富。産油国が価格などを話し合う組織＝OPEC（石油輸出国機構）。"],["EUの共通通貨は？","ユーロ","移動・仕事が自由","ヨーロッパ連合（EU）の多くの国で使う共通通貨＝ユーロ。国境をこえて人・もの・仕事の移動が自由。"],["ヨーロッパの農業は？","混合農業・地中海式農業","地中海はオリーブ・ぶどう","ヨーロッパは作物と家畜を組み合わせる『混合農業』、地中海沿岸は乾燥に強いオリーブ・ぶどうを育てる『地中海式農業』。"],["アフリカに多い経済は？","モノカルチャー経済","特定の輸出品にたよる","特定の輸出品（カカオ・銅など）にたよる経済＝モノカルチャー経済。価格の変動で収入が不安定になりやすい。"],["アメリカの農業の特徴は？","適地適作・企業的な大規模農業","シリコンバレー","アメリカは土地に合う作物を育てる『適地適作』と大型機械を使う『企業的な大規模農業』。世界の食料庫とよばれる。"],["オーストラリアの輸出資源は？","鉄鉱石・石炭","先住民アボリジニ","オーストラリアは鉄鉱石（西部）と石炭（東部）が主な輸出資源。先住民はアボリジニ。"]]},{"name":"塾の特訓（宗教・時差・古代文明）","cards":[["世界の三大宗教と、それぞれの開祖は？","キリスト教＝イエス、イスラム教＝ムハンマド、仏教＝シャカ（シッダールタ）","三大宗教は世界中に広がった","キリスト教＝イエス、イスラム教＝ムハンマド、仏教＝シャカ（シッダールタ）。いずれも民族をこえて世界に広がった。"],["ユダヤ教やヒンドゥー教が三大宗教に入らないのはなぜ？","特定の民族の宗教（民族宗教）だから","三大宗教は民族をこえて広がった","ユダヤ教・ヒンドゥー教は特定の民族・地域の宗教（民族宗教）だから。三大宗教は民族をこえて世界中に広がった点がちがう。"],["イスラム教の決まりを3つ","偶像崇拝の禁止・1日5回の礼拝・豚肉を食べない","経典はコーラン","イスラム教の決まり＝①偶像（像）を拝まない ②1日5回メッカへ礼拝 ③豚肉を食べない。経典はコーラン。"],["イスラム教が偶像（像）を拝むのを禁止する理由は？","神には形がない（と考える）から","アッラーは形をもたない","イスラム教では神（アッラー）には形がないと考えるから、像をつくって拝むことを禁止している。"],["ヒンドゥー教の特徴は？（インドの民族宗教）","牛を神聖な動物として食べない・多神教（マヌ法典）","牛を大切にする","インドの民族宗教＝ヒンドゥー教。牛を神聖な動物として大切にし食べない。多くの神をまつる多神教。"],["三大宗教それぞれの主な経典は？","キリスト教＝聖書、イスラム教＝コーラン、仏教＝仏典（経）","聖書・コーラン・仏典","キリスト教＝聖書、イスラム教＝コーラン、仏教＝仏典（経）。宗教ごとに教えを記した本がある。"],["時差の求め方（式）は？","経度の差 ÷ 15度 ＝ 時間の差","経度15度で1時間","時差＝経度の差÷15度。地球は15度で1時間ずれる。まず2地点の経度差を出し、15で割る。"],["日本(東経135度)が1/1の15時のとき、西経75度の都市は何時？","経度差210÷15＝14時間。西は遅れる→1/1の1:00","東は進む・西は遅れる","経度差は135＋75＝210度。210÷15＝14時間差。相手は西なので時刻は遅れる→15時の14時間前＝1月1日の1時。"],["2地点で、東と西どちらの時刻が進んでいる？","東のほうが進んでいる（時刻が早い）","太陽は東からのぼる","太陽は東からのぼるので、東にある地点ほど時刻が進んでいる（早い）。日本はイギリスより東なので9時間進む。"],["歴史の時代区分の大きな流れは？","古代→中世→近世→近代→現代","古い順に区分する","歴史は古代→中世→近世→近代→現代の順に区分する。古い順に大きく分けて流れをつかむ。"],["古代文明が生まれた共通の場所は？","大きな川の流域（エジプト＝ナイル川など）","水と肥えた土地に人が集まる","古代文明はどれも大きな川の流域で生まれた（エジプト＝ナイル川など）。水と肥えた土地があり農業に適していたから。"]]},{"name":"新中問 特訓（緯度経度・気候・文明）","cards":[["緯度0度の線を何という？","赤道","地球を南北に半分に分ける線だよ","緯度0度の線が赤道で、地球を南北に二等分しています。経度0度の線が本初子午線で、イギリスのロンドン（旧グリニッジ天文台）を通っています。日付変更線は経度180度付近にあります。"],["一年中気温が高く、雨が多い気候帯は？","熱帯","赤道付近の暑くて雨の多い地域だよ","熱帯は赤道付近に広がり、一年中気温が高く降水量が多いのが特徴です。熱帯雨林気候とサバナ気候に分かれます。乾燥帯は雨が少なく、温帯は四季がはっきりし、冷帯は冬がとても寒い気候です。"],["次のうち、ナイル川流域で発展した文明は？（メソポタミア文明／エジプト文明／インダス文明／中国文明（黄河文明））","エジプト文明","ピラミッドが建てられた場所を思い出そう","エジプト文明はナイル川流域で発展し、ピラミッドやスフィンクスが有名です。メソポタミア文明はチグリス・ユーフラテス川、インダス文明はインダス川、中国文明は黄河・長江流域で発展しました。"],["弥生時代に大陸から伝わり、人々の生活を大きく変えたものは？","稲作","弥生時代に始まった農業で、日本人の主食の原料だよ","紀元前4世紀頃に大陸から稲作（米づくり）が伝わり、弥生時代が始まりました。稲作により定住生活が進み、貧富の差や身分の上下が生まれ、むらからくにへと発展していきました。"],["聖徳太子が定めた、役人の心構えを示した法令は？","十七条の憲法","「和をもって貴しとなす」で始まる有名な法令だよ","十七条の憲法（604年）は、役人の心構えを17か条にまとめたものです。「和をもって貴しとなす」が有名。聖徳太子は他にも冠位十二階の制度を定め、遣隋使を送るなどしました。大宝律令は701年、御成敗式目は鎌倉時代です。"]]},{"name":"地理テスト① 世界と日本のすがた","cards":[["地理の「見方・考え方」で大事なのは、ものごとを何に注目して見ること？","位置や分布（どこにあるか・どう広がっているか）","どこに・なぜそこに？を考える","「位置」「分布」「地域」「結びつき」などに注目して、地球上のできごとを考えるのが地理の見方・考え方です。"],["六大陸を大きい順に。最大と最小は？","ユーラシア・アフリカ・北アメリカ・南アメリカ・南極・オーストラリア（最大＝ユーラシア、最小＝オーストラリア）","最大ユーラシア・最小オーストラリア","ユーラシア＞アフリカ＞北アメリカ＞南アメリカ＞南極＞オーストラリアの順。最大ユーラシア、最小オーストラリア。"],["三大洋は？ いちばん大きいのは？","太平洋・大西洋・インド洋（最大＝太平洋）","太平洋が世界最大の海","太平洋・大西洋・インド洋の3つ。いちばん広い海は太平洋。"],["世界の六つの州（地域）は？","アジア・ヨーロッパ・アフリカ・北アメリカ・南アメリカ・オセアニア","6つの州にわけられる","アジア・ヨーロッパ・アフリカ・北アメリカ・南アメリカ・オセアニアの6つ。世界を大きく6地域に分けたもの。"],["日本はどの州にある？","アジア州（東アジア）","日本＝東アジア","日本はアジア州、その中でも東アジアにふくまれる。"],["緯度0度の線を何という？","赤道","地球を南北に2等分する線","赤道は緯度0度で、ここから北を北緯、南を南緯で表します。"],["経度0度の線と、それが通る都市は？","本初子午線・ロンドン","ロンドン（旧グリニッジ天文台）を通る","本初子午線は経度0度。ここから東を東経、西を西経で表し、日本は東経135度です。"],["赤道に平行な横の線／北極と南極を結ぶ縦の線は？","緯線／経線","横が緯線・縦が経線","横（東西）の線が緯線、縦（南北）の線が経線。緯線と経線の交点で地球上の位置を表す。"],["本初子午線より東は東経、西は何という？","西経（赤道より南は南緯）","東は東経・西は西経","本初子午線より東が東経、西が西経。赤道より北が北緯、南が南緯。位置はこの組み合わせで表す。"],["山や川を使った国境／緯線・経線を使った直線的な国境を何という？","自然的国境／人工的国境","自然のものか、人が決めた線か","川・山・湖などを利用したのが自然的国境、緯線・経線などの直線で引いたのが人工的国境です。"],["まわりを海に囲まれた国／海に面していない国を何という？","島国（海洋国）／内陸国","日本は島国、モンゴルは内陸国","まわりを海に囲まれた国＝島国（海洋国）。海に全く面していない国＝内陸国。日本は島国、モンゴルは内陸国。"],["人口密度の求め方は？","人口 ÷ 面積（1km²あたりの人数）","人を面積で割る","人口密度＝人口÷面積。1km²あたり何人住んでいるかを表し、混み具合がわかります。"],["日付を調整する線と、その位置は？","日付変更線・ほぼ経度180度","ほぼ180度の線","日付変更線を西から東へこえると日付を1日もどし、東から西へこえると1日進めます。"],["時差の求め方（式）は？","経度の差 ÷ 15度","経度15度で1時間ずれる","地球は24時間で360度回るので、360÷24＝15度で1時間の差になります。"],["日本の標準時子午線は？通る市は？","東経135度・兵庫県明石市","ひがし135ど・あかし","各国は基準の経線（標準時子午線）で時刻を決めます。日本は東経135度（明石市）が基準です。"],["国や地域が基準にしている時刻を何という？","標準時","くにの基準の時刻","それぞれの国・地域が基準にしている時刻＝標準時。日本は東経135度の時刻を標準時にしている。"],["国の主権がおよぶ「領域」の3つは？","領土・領海・領空","りく・うみ・そら","領域＝領土（陸地）＋領海（沿岸の海）＋領空（その上空）。"],["領海の範囲は、海岸から何海里？","12海里","海岸から12海里","領海は海岸（基線）から12海里までの海で、その国の主権がおよぶ。"],["沿岸から200海里以内で、水産・鉱産資源の権利をもつ水域は？","排他的経済水域（EEZ）","200海里・資源は自国のもの","領海の外側、海岸から200海里までの範囲。魚や石油などの資源を自分の国のものにできます。"],["日本の東・西・南・北のはしの島は？","東＝南鳥島、西＝与那国島、南＝沖ノ鳥島、北＝択捉島","みなみとり・よなぐに・おきのとり・えとろふ","東端＝南鳥島(東京都)、西端＝与那国島(沖縄県)、南端＝沖ノ鳥島(東京都)、北端＝択捉島(北海道)。"],["北方領土の4島と、占拠している国は？","択捉島・国後島・色丹島・歯舞群島／ロシア","え・く・し・は／ロシア","北海道の北東にある日本固有の領土で、現在ロシアが占拠しています。"],["竹島は何県？ どこが不法に占拠している？","島根県（韓国が不法に占拠）","しまね県・韓国","竹島は島根県に属する日本固有の領土。現在、韓国が不法に占拠している。"],["尖閣諸島は何県にある日本固有の領土？","沖縄県","おきなわ県","中国などが領有を主張していますが、日本固有の領土であり、解決すべき領土問題は存在しません。"],["日本の都道府県の数は？","47（1都1道2府43県）","1都1道2府43県","日本の都道府県は全部で47（1都＝東京、1道＝北海道、2府＝大阪・京都、43県）。"],["日本の7地方区分は？","北海道・東北・関東・中部・近畿・中国四国・九州","北・東北・関東・中部・近畿・中国四国・九州","北海道・東北・関東・中部・近畿・中国四国・九州の7つ。中国と四国を合わせて1つにするのが7地方区分。"],["県庁所在地は？ 埼玉県／神奈川県／愛知県","さいたま市／横浜市／名古屋市","県名と都市名がちがう例","県名と都市名がちがう代表例。埼玉県＝さいたま市、神奈川県＝横浜市、愛知県＝名古屋市。"],["県庁所在地は？ 兵庫県／島根県／沖縄県","神戸市／松江市／那覇市","これも県名と都市名がちがう","兵庫県＝神戸市、島根県＝松江市、沖縄県＝那覇市。県名と都市名がちがうので要注意。"],["県庁所在地は？ 宮城県／愛媛県／香川県","仙台市／松山市／高松市","東北・四国の例","宮城県＝仙台市、愛媛県＝松山市、香川県＝高松市。東北と四国のまぎらわしい例。"]]},{"name":"地理テスト② 気候・くらし・フィールドワーク","cards":[["世界の気候帯5つは？（＋特別な気候）","熱帯・乾燥帯・温帯・冷帯（亜寒帯）・寒帯（＋高山気候）","赤道→極へ。山地は高山気候","赤道付近から極に向かって 熱帯→乾燥帯→温帯→冷帯→寒帯 と変化します。標高が高い所は高山気候。"],["一年中暑くて雨が多い気候帯と、午後に降る突然の強い雨は？","熱帯／スコール","あつい・雨おおい・スコール","熱帯は赤道付近に広がり、一年中高温。スコールという激しいにわか雨が降ります。"],["熱帯で見られる、うっそうとした密林を何という？","熱帯雨林","ねったいの森","熱帯の雨が多い地域に広がる、背の高い木がうっそうと茂る森林＝熱帯雨林（ジャングル）。"],["雨が少ない気候帯と、家畜を連れて移動する牧畜は？","乾燥帯／遊牧（する人＝遊牧民）","かんそう・移動しながら牧畜","乾燥帯は降水量が少なく砂漠やステップが広がります。草や水を求めて家畜と移動するのが遊 白いね／花がね／美しくね／咲いたね」と確認できます。"],["「彼女は　とても　優しい　人だ。」で、「とても」は文の成分として何にあたる？","修飾語","「とても」は何を詳しく説明している？","「とても」は「優しい」を詳しく説明（修飾）しています。このように用言（動詞・形容詞・形容動詞）を修飾する語を「連用修飾語」といいます。主語は「彼女は」、述語は「人だ」です。"],["「生」の読み方のうち、「音読み」はどれ？（いきる／うまれる／セイ／なま）","セイ","中国から伝わった読み方（カタカナで書くことが多い）はどれ？","音読みは中国から伝わった読み方で、カタカナで表記されることが多いです。「セイ」「ショウ」が音読み。一方、「いきる」「うまれる」「なま」は日本語の意味に基づく訓読みです。"]]}]}];

let warmed=false;
function warmup(){if(warmed||!window.speechSynthesis)return;try{const u=new SpeechSynthesisUtterance(' ');u.volume=0;speechSynthesis.speak(u);}catch(e){}warmed=true;}
function speakJa(t){if(!window.speechSynthesis)return;warmup();speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(t);u.lang='ja-JP';speechSynthesis.speak(u);}
function speakEn(t){if(!window.speechSynthesis)return;warmup();speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(t);u.lang='en-US';u.rate=0.9;speechSynthesis.speak(u);}
function isEn(s){return /^[\x00-\x7F]+$/.test(s);}
function rd(q,a){ if(isEn(q)) speakEn(q); else speakJa(a); }
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[a[i],a[j]]=[a[j],a[i]];}return a;}
function esc(s){return String(s).replace(/'/g,"\\'");}

const PKEY='saki_progress_v1';
function pload(){try{return JSON.parse(localStorage.getItem(PKEY))||{}}catch(e){return{}}}
function psave(p){try{localStorage.setItem(PKEY,JSON.stringify(p))}catch(e){}}
function dstr(d){return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();}
function today(){return dstr(new Date());}
function record(subjId,unitName,mode,score,total){
 const p=pload(); p.units=p.units||{}; p.days=p.days||{}; p.log=p.log||[];
 const k=subjId+'|'+unitName, u=p.units[k]||{done:false,best:0};
 u.done=true; u.last=today(); if(mode==='quiz') u.best=Math.max(u.best||0, Math.round(score/Math.max(total,1)*100));
 p.units[k]=u; p.days[today()]=(p.days[today()]||0)+(total||1);
 p.log.unshift({s:subjId,u:unitName,mode:mode,score:score,total:total,date:today()}); p.log=p.log.slice(0,60);
 psave(p); if(typeof checkBadges==='function')checkBadges();
}
function streakDays(){const p=pload(),days=p.days||{};let n=0,d=new Date();
 if(!days[dstr(d)])d.setDate(d.getDate()-1);
 for(;;){if(days[dstr(d)]){n++;d.setDate(d.getDate()-1);}else break;} return n;}
function subjProg(s){if(!s.units)return null;const p=pload(),u=p.units||{};let tot=0,c=0;
 s.units.forEach(un=>{if(un.link)return;tot++;if(u[s.id+'|'+un.name]&&u[s.id+'|'+un.name].done)c++;});return[c,tot];}
function nextReco(){const p=pload(),u=p.units||{};
 for(const s of SUBJECTS){if(!s.units)continue;for(const un of s.units){if(un.link)continue;if(!(u[s.id+'|'+un.name]&&u[s.id+'|'+un.name].done))return{s:s,un:un,fresh:true};}}
 let lo=null;for(const s of SUBJECTS){if(!s.units)continue;for(const un of s.units){if(un.link)continue;const r=u[s.id+'|'+un.name]||{};const sc=r.best||0;if(lo===null||sc<lo.sc)lo={s:s,un:un,sc:sc};}}
 return lo;}

  h+='<button class="unit" onclick="openUnit('+i+')" style="border-color:'+s.color+'44"><span>'+u.name+'</span>'+mark+'</button>';});

 st.unit=u;st.mode='card';st.idx=0;st.qidx=0;st.score=0;st.total=0;st.rec=false;st.cardrec=false;st.wrong=[];st.order=u.cards.map((_,k)=>k);renderStudy();}

function renderStudy(){setCrumbs();const s=st.subj;
 view.innerHTML='<div class="modes"><button class="mode '+(st.mode==='card'?'on':'')+'" style="'+(st.mode==='card'?'background:'+s.color:'')+'" onclick="setMode(\'card\')">🃏 カード</button>'+
 '<button class="mode '+(st.mode==='quiz'?'on':'')+'" style="'+(st.mode==='quiz'?'background:'+s.color:'')+'" onclick="setMode(\'quiz\')">📝 4択クイズ</button></div>'+
 '<div class="panel" id="study"></div><div style="margin-top:10px"><button class="backbtn" onclick="goSubj(\''+s.id+'\')">← 単元をえらぶ</button></div>'+
 '<div class="hint">🔊で答えを読み上げ。黄色は「暗記ポイント」。やったら記録されるよ！</div>';
 if(st.mode==='card')renderCard();else renderQuiz();}
function renderCard(){const s=st.subj,cards=st.unit.cards,c=cards[st.order[st.idx]];
 let hint=c[2]?'<div class="hintbox" id="hb">💡 覚え方：'+c[2]+'</div>':'';
 let exp=c[3]?'<div class="explainbox" id="eb"><b>📖 くわしい解説</b><br>'+c[3]+'</div>':'';
 document.getElementById('study').innerHTML='<div class="counter">'+(st.idx+1)+' / '+cards.length+'</div>'+
 '<div class="card" style="border-color:'+s.color+'33"><div class="q">Q. '+c[0]+'</div><div class="a" id="a" style="color:'+s.color+'">A. '+c[1]+'</div>'+hint+exp+'</div>'+
 '<div class="btns"><button class="btn prev" onclick="nav(-1)">◀</button><button class="btn flip" onclick="showA()">答えを見る👀</button>'+
 '<button class="btn speak" onclick="rd(\''+esc(c[0])+'\',\''+esc(c[1])+'\')">🔊</button><button class="btn next" onclick="nav(1)">▶</button></div>'+
 '<div class="btns">'+(c[3]?'<button class="btn explain" onclick="showExp()">📖 くわしい解説</button>':'')+'<button class="btn done" onclick="markCard()">この単元おぼえた！✓</button><button class="backbtn" onclick="shuf()">🔀 シャッフル</button></div>';}
function showA(){document.getElementById('a').classList.add('show');const hb=document.getElementById('hb');if(hb)hb.classList.add('show');}

function nav(d){const n=st.unit.cards.length;st.idx=(st.idx+d+n)%n;renderCard();}
function shuf(){st.order=shuffle(st.order);st.idx=0;renderCard();}
function markCard(){if(!st.cardrec){record(st.subj.id,st.unit.name,'card',0,st.unit.cards.length);st.cardrec=true;addPoints(20);toast('記録したよ！えらい！⭐ ＋20pt');}else toast('記録ずみだよ！⭐');pop();}
function renderQuiz(){const s=st.subj,cards=st.unit.cards;
 if(st.qidx>=st.order.length){const pct=Math.round(st.score/Math.max(st.total,1)*100);
  if(!st.rec){record(s.id,st.unit.name,'quiz',st.score,st.total);st.rec=true;if(pct===100)markPerfect();checkBadges();}
  const w=[...new Set(st.wrong)];
  let msg=pct===100?'パーフェクト！🏆 まちがいゼロ！':pct>=70?'すごい！その調子！🎉':'もう一回チャレンジ！💪';

  document.getElementById('study').innerHTML='<div class="card"><div class="q">'+st.score+' / '+st.total+' 問せいかい！</div><div style="font-size:18px;font-weight:800;color:'+s.color+';margin-top:8px">'+msg+'</div>'+(w.length?'<div style="font-size:13px;color:#ff7a7a;font-weight:800;margin-top:6px">まちがえた問題が '+w.length+' 問あるよ。下のボタンでそこだけ復習できる！</div>':'')+'</div><div class="btns">'+rb+'<button class="btn next" onclick="setMode(\'quiz\')">ぜんぶ もう一回</button><button class="backbtn" onclick="goHome()">🏠 トップで記録を見る</button></div>';
  if(pct>=70)pop();return;}
 const c=cards[st.order[st.qidx]];let pool=[];s.units.forEach(u=>u.cards&&u.cards.forEach(x=>{if(x[1]!==c[1])pool.push(x[1]);}));
 pool=shuffle(pool).slice(0,3);const opts=shuffle([c[1]].concat(pool));st.answered=false;
 let h='<div class="counter">問題 '+(st.qidx+1)+' / '+st.order.length+'　とくてん：<span class="score">'+st.score+'</span></div>'+
 '<div class="card" style="min-height:110px;border-color:'+s.color+'33"><div class="q">Q. '+c[0]+'</div></div><div class="opts" id="opts">';
 opts.forEach((o,i)=>{h+='<button class="opt" data-o="'+encodeURIComponent(o)+'">'+'アイウエ'[i]+'．'+o+'</button>';});
 h+='</div><div class="fb" id="fb"></div><div id="why"></div><div class="btns"><button class="btn next" id="nq" style="display:none" onclick="st.qidx++;renderQuiz()">つぎ ▶</button></div>';
 document.getElementById('study').innerHTML=h;
 document.querySelectorAll('.opt').forEach(b=>b.onclick=()=>{if(st.answered)return;st.answered=true;st.total++;
  const chosen=decodeURIComponent(b.dataset.o),fb=document.getElementById('fb');
  const ex=c[3]||c[2],wb=document.getElementById('why');
  if(chosen===c[1]){b.classList.add('correct');st.score++;fb.textContent='せいかい！⭕ ＋10pt';fb.style.color=COLOR.green;speakJa(c[1]);addPoints(10);
   if(ex)wb.innerHTML='<div class="whybox"><b>📖 なぜ？</b> '+ex+'</div>';pop();}
  else{b.classList.add('wrong');st.wrong.push(st.order[st.qidx]);fb.innerHTML='ざんねん…❌';fb.style.color='#ff5b5b';
   document.querySelectorAll('.opt').forEach(x=>{if(decodeURIComponent(x.dataset.o)===c[1])x.classList.add('correct');});
   wb.innerHTML='<div class="wrongbox"><b>✗ せいかいは「'+c[1]+'」</b>'+(ex?'<br><span style="color:#a33">📖 '+ex+'</span>':'')+'</div>';}
  document.getElementById('nq').style.display='inline-block';});}

const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
function pop(){cv.width=innerWidth;cv.height=innerHeight;let ps=[];for(let i=0;i<70;i++)ps.push({x:innerWidth/2,y:innerHeight/3,vx:(Math.random()-.5)*12,vy:Math.random()*-12-3,c:'hsl('+(Math.random()*360)+',90%,60%)',r:Math.random()*6+3});
 let t=0;(function fr(){ctx.clearRect(0,0,cv.width,cv.height);ps.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.4;ctx.fillStyle=p.c;ctx.fillRect(p.x,p.y,p.r,p.r);});if(++t<70)requestAnimationFrame(fr);else ctx.clearRect(0,0,cv.width,cv.height);})();}
// ---- points & level ----
function lvlFromPts(pt){return Math.floor((pt||0)/100)+1;}
function totalQ(){const p=pload(),d=p.days||{};let n=0;for(const k in d)n+=d[k];return n;}
function addPoints(n){const p=pload();const before=lvlFromPts(p.points||0);p.points=(p.points||0)+n;const after=lvlFromPts(p.points);psave(p);
 if(after>before){setTimeout(()=>{toast('レベルアップ！🎉 Lv.'+after+'になったよ！');pop();},250);}
 checkBadges();}
function markPerfect(){const p=pload();p.perfects=(p.perfects||0)+1;psave(p);}

function subjDone(id){const s=SUBJECTS.find(x=>x.id===id);if(!s)return false;const pr=subjProg(s);return pr&&pr[1]>0&&pr[0]>=pr[1];}
const BADGES=[
 {id:'start',e:'🌱',n:'はじめの一歩',f:p=>totalQ()>=1},

function checkBadges(){const p=pload();p.badges=p.badges||{};let nw=null;

let daily={list:[],idx:0,score:0,total:0,answered:false,wrong:[],rec:false,round:0};
function dseed(){const t=today();let h=5381;for(let i=0;i<t.length;i++)h=((h*33)^t.charCodeAt(i))>>>0;return h;}
function srand(seed){let s=seed>>>0||1;return function(){s=(s*1664525+1013904223)>>>0;return s/4294967296;};}
function spick(arr,n,rnd){const a=arr.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(rnd()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a.slice(0,n);}
function dseenKey(){return 'daily_seen_'+today();}
function loadSeen(){try{return JSON.parse(localStorage.getItem(dseenKey()))||[]}catch(e){return[]}}
function addSeen(ids){try{const s=new Set(loadSeen());ids.forEach(i=>s.add(i));localStorage.setItem(dseenKey(),JSON.stringify([...s]));}catch(e){}}
function dailyDoneCount(){return loadSeen().length;}
function pickDaily(round){const rnd=srand((dseed()+round*2654435761)>>>0);const seen=new Set(loadSeen());
 let bySubj=[];SUBJECTS.forEach(s=>{if(!s.units)return;let pool=[];s.units.forEach(u=>{if(u.link)return;u.cards.forEach(c=>{if(c&&c.length>=2&&c[0]&&c[1]){const id=s.id+'|'+c[0];if(!seen.has(id))pool.push({c:c,s:s,id:id});}});});if(pool.length)bySubj.push(pool);});
 let out=[];bySubj.forEach(pool=>{out=out.concat(spick(pool,Math.min(2,pool.length),rnd));});
 if(out.length<10){let all=[];bySubj.forEach(p=>all=all.concat(p));const used=new Set(out.map(x=>x.id));all=all.filter(x=>!used.has(x.id));out=out.concat(spick(all,10-out.length,rnd));}
 if(out.length<10){let all=[];SUBJECTS.forEach(s=>{if(!s.units)return;s.units.forEach(u=>{if(u.link)return;u.cards.forEach(c=>{if(c&&c.length>=2&&c[0]&&c[1])all.push({c:c,s:s,id:s.id+'|'+c[0]});});});});out=spick(all,10,rnd);}
 return spick(out,Math.min(10,out.length),rnd).slice(0,10);}
function startDaily(round){round=round||0;const list=pickDaily(round);addSeen(list.map(x=>x.id));daily={list:list,idx:0,score:0,total:0,answered:false,wrong:[],rec:false,round:round};st.subj=null;st.unit=null;renderDaily();}
function retryDailyWrong(){const w=[...new Set(daily.wrong)];if(!w.length){startDaily();return;}daily.list=w.map(i=>daily.list[i]);daily.idx=0;daily.score=0;daily.total=0;daily.wrong=[];daily.rec=false;renderDaily();}
function renderDaily(){
 crumbs.innerHTML='<a onclick="goHome()">🏠 トップ</a> ＞ 🎯 今日の10問';
 if(daily.idx>=daily.list.length){const pct=Math.round(daily.score/Math.max(daily.total,1)*100);
  if(!daily.rec){record('daily','今日の10問','quiz',daily.score,daily.total);daily.rec=true;if(pct===100)markPerfect();checkBadges();}
  const w=[...new Set(daily.wrong)];
  let msg=pct===100?'パーフェクト！🏆 ぜんぶ正解！':pct>=70?'すごい！その調子！🎉':'よくがんばった！もう一回いこう💪';
  let rb=w.length?'<button class="btn explain" onclick="retryDailyWrong()">🔁 まちがえた'+w.length+'問だけ</button>':'';
  let more='<button class="btn done" style="background:#ff9f1c" onclick="startDaily('+(daily.round+1)+')">➡️ さらに10題！</button>';
  view.innerHTML='<div class="panel"><div class="card"><div class="q">🎯 今日の10問<br>'+daily.score+' / '+daily.total+' 問せいかい！</div><div style="font-size:18px;font-weight:800;color:var(--pink);margin-top:8px">'+msg+'</div><div style="font-size:13px;color:#37b24d;font-weight:800;margin-top:8px">きょうクリア：'+dailyDoneCount()+'問 🎉</div></div><div class="btns">'+more+rb+'<button class="backbtn" onclick="goHome()">🏠 トップにもどる</button></div></div>';
  if(pct>=70)pop();return;}
 const item=daily.list[daily.idx],c=item.c,s=item.s;
 let pool=[];s.units.forEach(u=>u.cards&&u.cards.forEach(x=>{if(x[1]!==c[1])pool.push(x[1]);}));
 pool=shuffle(pool).slice(0,3);const opts=shuffle([c[1]].concat(pool));daily.answered=false;
 const ex=c[3]||c[2];
 let h='<div class="panel"><div class="counter">🎯 今日の10問　'+(daily.idx+1)+' / '+daily.list.length+'　とくてん：<span class="score">'+daily.score+'</span></div>'+
  '<div class="card" style="min-height:110px;border-color:'+s.color+'55"><div style="font-size:12px;font-weight:800;color:'+s.color+'">'+s.emoji+' '+s.name+'</div><div class="q">Q. '+c[0]+'</div></div><div class="opts" id="opts">';
 opts.forEach((o,i)=>{h+='<button class="opt" data-o="'+encodeURIComponent(o)+'">'+'アイウエ'[i]+'．'+o+'</button>';});
 h+='</div><div class="fb" id="fb"></div><div id="why"></div><div class="btns"><button class="btn next" id="nq" style="display:none" onclick="daily.idx++;renderDaily()">つぎ ▶</button></div></div>'+
  '<div style="margin-top:10px"><button class="backbtn" onclick="goHome()">← トップにもどる</button></div>';
 view.innerHTML=h;
 document.querySelectorAll('.opt').forEach(b=>b.onclick=()=>{if(daily.answered)return;daily.answered=true;daily.total++;
  const chosen=decodeURIComponent(b.dataset.o),fb=document.getElementById('fb'),wb=document.getElementById('why');
  if(chosen===c[1]){b.classList.add('correct');daily.score++;fb.textContent='せいかい！⭕ ＋10pt';fb.style.color=COLOR.green;speakJa(c[1]);addPoints(10);
   if(ex)wb.innerHTML='<div class="whybox"><b>📖 なぜ？</b> '+ex+'</div>';pop();}
  else{b.classList.add('wrong');daily.wrong.push(daily.idx);fb.innerHTML='ざんねん…❌';fb.style.color='#ff5b5b';
   document.querySelectorAll('.opt').forEach(x=>{if(decodeURIComponent(x.dataset.o)===c[1])x.classList.add('correct');});
   wb.innerHTML='<div class="wrongbox"><b>✗ せいかいは「'+c[1]+'」</b>'+(ex?'<br><span style="color:#a33">📖 '+ex+'</span>':'')+'</div>';}
  document.getElementById('nq').style.display='inline-block';});}
