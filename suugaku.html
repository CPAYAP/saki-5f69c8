<html lang="ja"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1,maximum-scale=1,user-scalable=no">

<title>さきの 毎日数学チャレンジ</title>
<style>
:root{--pink:#e0457f;--blue:#4a90e2;--green:#37b24d;--teal:#16b7b0;--orange:#ff9f1c;--purple:#8a5cf6;--ink:#2b2b3a;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;font-family:"Hiragino Maru Gothic ProN","Hiragino Sans","Yu Gothic UI","Meiryo",system-ui,sans-serif;
color:var(--ink);background:linear-gradient(135deg,#ffe9f3,#e9f3ff 50%,#eafff0);min-height:100vh;}
.wrap{max-width:560px;margin:0 auto;padding:14px 14px 60px;}
.head{display:flex;align-items:center;gap:10px;margin-bottom:6px;}
.head .m{width:54px;height:54px;flex:0 0 54px;animation:bob 2.4s ease-in-out infinite;cursor:pointer;}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.head h1{margin:0;font-size:20px;color:#d6357f;text-shadow:1px 1px 0 #fff;}
.head h1 small{display:block;font-size:11px;color:#777;font-weight:normal;}
.crumbs{font-size:13px;color:#888;font-weight:700;margin:4px 2px 10px;}
.crumbs a{color:var(--blue);cursor:pointer;text-decoration:none;}
.dash{background:#fff;border-radius:18px;padding:14px 16px;margin:4px 0 14px;box-shadow:0 4px 14px rgba(90,90,160,.12);}
.dtop{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.stat{background:#fff7ea;border:2px solid #ffe178;border-radius:12px;padding:6px 11px;font-weight:800;font-size:14px;color:#7a5b00;}
.stat.s{background:#ffeef4;border-color:#ffc2d8;color:#b03a66;}
.stat.w{background:#eef6ff;border-color:#b9dbff;color:#2a6fb0;}
.lvwrap{display:flex;align-items:center;gap:10px;margin:12px 0 2px;}
.lvbadge{background:linear-gradient(135deg,#ffd23f,#ff9f1c);color:#fff;font-weight:900;border-radius:12px;padding:6px 12px;font-size:14px;box-shadow:0 2px 0 rgba(0,0,0,.12);white-space:nowrap;}
.lvbar{flex:1;height:14px;background:#eee;border-radius:9px;overflow:hidden;box-shadow:inset 0 1px 2px rgba(0,0,0,.1);}
.lvbar>i{display:block;height:100%;background:linear-gradient(90deg,#ffe178,#ff9f1c);width:0;transition:width .6s cubic-bezier(.2,.8,.3,1);}
.weekrow{display:flex;gap:6px;margin-top:12px;justify-content:space-between;}
.wd{flex:1;text-align:center;font-size:11px;font-weight:800;color:#aaa;}
.wd .dot{width:26px;height:26px;border-radius:50%;margin:3px auto 2px;background:#eee;display:flex;align-items:center;justify-content:center;font-size:13px;}
.wd .dot.on{background:linear-gradient(135deg,#ff9f1c,#ffd23f);color:#fff;box-shadow:0 2px 0 rgba(255,150,0,.25);}
.wd .dot.today{outline:2px dashed var(--pink);outline-offset:1px;}
.bigbtn{display:block;width:100%;border:none;border-radius:18px;padding:18px;font-size:19px;font-weight:900;color:#fff;
background:linear-gradient(135deg,var(--pink),#ff7eb0);box-shadow:0 6px 0 rgba(0,0,0,.13);cursor:pointer;margin:6px 0;}
.bigbtn:active{transform:translateY(3px);box-shadow:0 3px 0 rgba(0,0,0,.13);}
.bigbtn.sub{background:linear-gradient(135deg,#7aa8e8,var(--blue));font-size:16px;padding:14px;}
.bigbtn.weak{background:linear-gradient(135deg,#ffb14a,var(--orange));}
.bigbtn:disabled{filter:grayscale(.6);opacity:.55;cursor:default;box-shadow:0 3px 0 rgba(0,0,0,.1);}
.panel{background:#fff;border-radius:20px;padding:18px 16px;box-shadow:0 8px 24px rgba(90,90,160,.15);}
.counter{display:flex;justify-content:space-between;align-items:center;color:#888;font-size:13px;font-weight:800;margin-bottom:10px;}
.tag{background:#f1edff;color:#6b48d6;border-radius:9px;padding:3px 9px;font-size:11px;font-weight:800;}
.card{border-radius:18px;padding:22px 16px;background:linear-gradient(160deg,#fff,#f7faff);border:3px solid #e7eefc;animation:cardin .3s;text-align:center;}
@keyframes cardin{from{transform:translateY(8px);opacity:.4}to{transform:translateY(0);opacity:1}}
.qtxt{font-size:21px;font-weight:800;line-height:1.6;color:#23304a;}
.qstory{font-size:14px;font-weight:700;color:#8a7fa8;margin-bottom:8px;line-height:1.5;}
.ansrow{display:flex;gap:8px;justify-content:center;align-items:center;margin-top:18px;}
.ansrow input{width:140px;font-size:24px;font-weight:900;text-align:center;border:3px solid #d8e2f5;border-radius:14px;padding:10px;color:var(--ink);outline:none;}
.ansrow input:focus{border-color:var(--blue);}
.unit{font-size:15px;font-weight:800;color:#888;}
.hintbtn{margin-top:14px;background:#fff7e0;border:2px solid #ffd84a;color:#7a5b00;border-radius:13px;padding:11px 14px;font-size:14px;font-weight:800;cursor:pointer;width:100%;}
.hintbtn:active{transform:scale(.98);}
.hintbox{margin-top:10px;background:#fff9e8;border:2px solid #ffe39a;border-radius:13px;padding:11px 14px;font-size:14.5px;color:#7a5b00;font-weight:700;line-height:1.6;text-align:left;animation:pop .25s;}
.hintbox .hl{font-size:11px;font-weight:900;color:#c98a00;display:block;margin-bottom:2px;}
@keyframes pop{from{transform:scale(.85);opacity:0}to{transform:scale(1);opacity:1}}
.btns{display:flex;gap:10px;justify-content:center;margin-top:16px;flex-wrap:wrap;}
.btn{border:none;border-radius:14px;padding:13px 18px;font-size:16px;font-weight:800;cursor:pointer;color:#fff;box-shadow:0 4px 0 rgba(0,0,0,.12);}
.btn:active{transform:translateY(2px);box-shadow:0 2px 0 rgba(0,0,0,.12);}
.check{background:var(--green);flex:1;}.next{background:var(--pink);flex:1;}.speak{background:var(--blue);}.skip{background:#c3c3d0;}
.fb{text-align:center;font-size:19px;font-weight:900;min-height:26px;margin-top:14px;}
.solbox{margin-top:12px;background:#eef6ff;border:2px solid #b9dbff;border-radius:13px;padding:12px 14px;font-size:14.5px;color:#23527a;font-weight:600;line-height:1.7;text-align:left;animation:pop .25s;}
.solbox b{color:#1c6fd0;}
.okbox{margin-top:12px;background:#e9fbef;border:2px solid #a7e6bd;border-radius:13px;padding:12px 14px;font-size:14.5px;color:#1d7a45;font-weight:700;line-height:1.7;text-align:left;animation:pop .25s;}
.tipbox{margin-top:10px;background:#fff7e0;border:2px dashed #ffcf4d;border-radius:13px;padding:11px 14px;font-size:14px;color:#8a6a00;font-weight:700;line-height:1.7;text-align:left;animation:pop .25s;}
.tipbox b{color:#c98a00;}
.tipmore{margin-top:6px;display:inline-block;color:#e0457f;font-weight:800;font-size:13px;cursor:pointer;}
.bigbtn.kotsu{background:linear-gradient(135deg,#9b7be8,#7a5cf6);}
.kcat{margin:14px 2px 8px;font-size:15px;font-weight:900;color:#6b48d6;}
.kitem{display:flex;align-items:flex-start;gap:10px;background:#fff;border:2px solid #eee;border-radius:14px;padding:12px 14px;margin:8px 0;cursor:pointer;box-shadow:0 2px 0 rgba(0,0,0,.05);transition:transform .08s;text-align:left;}
.kitem:active{transform:scale(.99);}
.kitem .ke{font-size:24px;flex:0 0 auto;}
.kitem .kt{font-weight:800;font-size:15px;color:#33324a;}
.kitem .kh{font-size:12.5px;color:#888;font-weight:700;margin-top:2px;line-height:1.5;}
.kdetail .krow{margin:10px 0;}
.kdetail .klabel{font-size:12px;font-weight:900;color:#9a7300;margin-bottom:3px;}
.vsbox{display:flex;flex-direction:column;gap:8px;margin-top:8px;}
.vshard{background:#fff0f0;border:2px solid #ffc2c2;border-radius:12px;padding:10px 12px;font-size:13.5px;color:#a33;line-height:1.6;}
.vseasy{background:#e9fbef;border:2px solid #a7e6bd;border-radius:12px;padding:10px 12px;font-size:13.5px;color:#1d7a45;font-weight:700;line-height:1.6;}
.kexample{margin-top:8px;background:#eef6ff;border:2px solid #b9dbff;border-radius:12px;padding:9px 12px;font-size:15px;font-weight:800;color:#1c6fd0;text-align:center;}
.stat.k{background:#f1edff;border-color:#cdbcff;color:#6b48d6;}
.btn.usekotsu{background:#8a5cf6;}
.mmark{font-size:15px;}
.kcnt{flex:0 0 auto;background:#f1edff;color:#6b48d6;border-radius:10px;padding:3px 8px;font-size:12px;font-weight:800;align-self:center;}
.kmastery{margin-top:10px;background:#f6f2ff;border:2px solid #e2d8ff;border-radius:12px;padding:9px 12px;font-size:13px;font-weight:700;color:#6b48d6;text-align:center;line-height:1.6;}
.kmastery b{color:#8a5cf6;}
.bigbtn.commute{background:linear-gradient(135deg,#3fb6c9,#16b7b0);}
.commute .ccard{border-radius:18px;padding:26px 18px;background:linear-gradient(160deg,#fff,#f0fbfb);border:3px solid #c9eef0;text-align:center;margin:6px 0;animation:cardin .3s;}
.commute .cnum{font-size:13px;font-weight:800;color:#16b7b0;margin-bottom:8px;}
.commute .cq{font-size:24px;font-weight:900;line-height:1.6;color:#23304a;}
.commute .ca{font-size:22px;font-weight:900;color:var(--teal);margin-top:14px;animation:pop .25s;}
.cbtns{display:flex;gap:8px;justify-content:center;margin-top:14px;flex-wrap:wrap;}
.cbtns .btn{flex:1;min-width:96px;}
.autobtn{display:block;width:100%;margin-top:12px;border:none;border-radius:14px;padding:14px;font-size:15px;font-weight:800;cursor:pointer;color:#fff;background:linear-gradient(135deg,#7a5cf6,#9b7be8);box-shadow:0 4px 0 rgba(0,0,0,.12);}
.autobtn.on{background:linear-gradient(135deg,#ff7eb0,#e0457f);}
.autobtn:active{transform:translateY(2px);box-shadow:0 2px 0 rgba(0,0,0,.12);}
.chelp{font-size:12px;color:#9aa;text-align:center;margin-top:10px;line-height:1.5;}
.toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%);background:#2b2b3a;color:#fff;padding:12px 18px;border-radius:14px;font-weight:800;z-index:120;opacity:0;transition:opacity .2s;font-size:15px;}
.toast.show{opacity:.96;}
.cv{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:99;}
.footer{text-align:center;font-size:11px;color:#bbb;margin-top:20px;line-height:1.6;}
.medalrow{margin-top:14px;}
.medalrow h3{margin:4px 0 6px;font-size:13px;color:#666;}
.medals{display:flex;flex-wrap:wrap;gap:7px;}
.medal{width:52px;height:52px;border-radius:13px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:20px;background:#f3f3f7;border:2px solid #eee;}
.medal.got{background:#fff7ea;border-color:#ffd84a;box-shadow:0 2px 0 rgba(255,170,0,.18);}
.medal.locked{filter:grayscale(1);opacity:.32;}
.medal .ml{font-size:8px;font-weight:800;color:#7a5b00;margin-top:1px;line-height:1.05;text-align:center;}
.endcard{text-align:center;}
.endcard .big{font-size:46px;margin:6px 0;}
</style></head>
<body>
<div class="wrap">
  <div class="head">
    <svg class="m" onclick="goHome()" viewBox="0 0 100 100"><title>トップにもどる</title>
      <circle cx="50" cy="54" r="38" fill="#ffd23f"/><circle cx="38" cy="50" r="5" fill="#2b2b3a"/><circle cx="62" cy="50" r="5" fill="#2b2b3a"/>
      <path d="M40 66 Q50 74 60 66" stroke="#2b2b3a" stroke-width="3.5" fill="none" stroke-linecap="round"/>
      <circle cx="30" cy="60" r="5" fill="#ff9bbd" opacity=".7"/><circle cx="70" cy="60" r="5" fill="#ff9bbd" opacity=".7"/>
      <text x="50" y="26" font-size="16" text-anchor="middle">✏️</text></svg>
    <h1>毎日数学チャレンジ<small>1日1問でいいよ。すこしずつ◎</small></h1>
  </div>
  <div class="crumbs" id="crumbs"></div>
  <div id="view"></div>
  <div class="footer">咲希せんよう・スマホでサクッと／こたえは半角すうじで入力してね</div>
</div>
<canvas class="cv" id="cv"></canvas>
<div class="toast" id="toast"></div>

<script>
/* =========================================================
   毎日数学チャレンジ ─ 既存おべんきょうサイトと連動する単独ページ
   ・進捗(連続日数/ポイント/レベル)は既存サイトと共通の PKEY を使用
   ・数学のミス問題だけは専用キー(WKEY)で弱点リピート(SRS)管理
   ========================================================= */

// ----- 共有プロフィール(既存サイトと同じ saki_progress_v1) -----
const PKEY='saki_progress_v1';
function pload(){try{return JSON.parse(localStorage.getItem(PKEY))||{}}catch(e){return{}}}
function psave(p){try{localStorage.setItem(PKEY,JSON.stringify(p))}catch(e){}}
function dstr(d){return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();}
function today(){return dstr(new Date());}
function lvlFromPts(pt){return Math.floor((pt||0)/100)+1;}
function addPoints(n){const p=pload();const before=lvlFromPts(p.points||0);p.points=(p.points||0)+n;const after=lvlFromPts(p.points);psave(p);
  if(after>before){setTimeout(()=>{toast('レベルアップ！🎉 Lv.'+after+'になったよ！');pop();},300);}}
function recordDay(n){const p=pload();p.days=p.days||{};p.days[today()]=(p.days[today()]||0)+(n||1);
  p.log=p.log||[];p.log.unshift({s:'daily',u:'毎日数学',mode:'math',score:n,total:n,date:today()});p.log=p.log.slice(0,60);psave(p);}
function streakDays(){const p=pload(),days=p.days||{};let n=0,d=new Date();
  if(!days[dstr(d)])d.setDate(d.getDate()-1);
  for(;;){if(days[dstr(d)]){n++;d.setDate(d.getDate()-1);}else break;}return n;}
function solvedToday(){const p=pload();return (p.mathDay&&p.mathDay.date===today())?p.mathDay.n:0;}
function bumpSolvedToday(){const p=pload();if(!p.mathDay||p.mathDay.date!==today())p.mathDay={date:today(),n:0};p.mathDay.n++;psave(p);}

// ----- 弱点リピート(SRS) -----
const WKEY='saki_math_weak_v1';
function wload(){try{return JSON.parse(localStorage.getItem(WKEY))||{}}catch(e){return{}}}
function wsave(w){try{localStorage.setItem(WKEY,JSON.stringify(w))}catch(e){}}
// 各問題 id ごとに {due:'YYYY-M-D', miss:n, streak:n}。dueが今日以前なら出題対象
function markMiss(id){const w=wload();const e=w[id]||{miss:0,streak:0};e.miss++;e.streak=0;e.due=today();w[id]=e;wsave(w);}
function markHit(id){const w=wload();const e=w[id];if(!e)return; // ミス登録があるものだけ間隔を伸ばす
  e.streak=(e.streak||0)+1;const gap=e.streak>=3?7:(e.streak===2?3:1);
  const d=new Date();d.setDate(d.getDate()+gap);e.due=dstr(d);w[id]=e;
  if(e.streak>=4){delete w[id];} // 4回連続正解で卒業
  wsave(w);}
function weakDueIds(){const w=wload();const out=[];
  for(const id in w){if(cmpDate(w[id].due,today())<=0)out.push(id);}return out;}
function weakCount(){return weakDueIds().length;}
function cmpDate(a,b){const pa=a.split('-').map(Number),pb=b.split('-').map(Number);
  return (pa[0]-pb[0])||(pa[1]-pb[1])||(pa[2]-pb[2]);}

// ----- 出題ロジック -----
// 今日すでに出した問題idを覚えて重複を避ける
function dseenKey(){return 'math_seen_'+today();}
function loadSeen(){try{return JSON.parse(localStorage.getItem(dseenKey()))||[]}catch(e){return[]}}
function addSeen(id){try{const s=new Set(loadSeen());s.add(id);localStorage.setItem(dseenKey(),JSON.stringify([...s]));}catch(e){}}

function pickNext(){
  const seen=new Set(loadSeen());
  // 1) 弱点(due)を最優先（今日まだ出してないもの）
  const weak=weakDueIds().filter(id=>!seen.has(id));
  if(weak.length){const id=weak[Math.floor(Math.random()*weak.length)];return {q:byId(id),weak:true};}
  // 2) 新しい問題（今日未出題）
  const fresh=BANK.filter(q=>!seen.has(q.id));
  if(fresh.length){return {q:fresh[Math.floor(Math.random()*fresh.length)],weak:false};}
  // 3) 全部出し切ったらシャッフルで復習
  return {q:BANK[Math.floor(Math.random()*BANK.length)],weak:false};
}
function byId(id){return BANK.find(q=>q.id===id)||BANK[0];}

// ----- 画面状態 -----
let cur=null, curWeak=false, hintLevel=0, answered=false;
const view=document.getElementById('view');
const crumbs=document.getElementById('crumbs');

function goHome(){renderHome();}

function renderHome(){
  crumbs.innerHTML='';
  const stk=streakDays(), p=pload(), pts=p.points||0, lv=lvlFromPts(pts), into=pts%100;
  const st=solvedToday(), wc=weakCount();
  const goalMet=st>=1;
  // 週カレンダー（直近7日）
  const days=p.days||{};let week='';const dows=['日','月','火','水','木','金','土'];
  for(let i=6;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);const key=dstr(d);const on=!!days[key];
    week+='<div class="wd">'+dows[d.getDay()]+'<div class="dot'+(on?' on':'')+(i===0?' today':'')+'">'+(on?'✓':'')+'</div></div>';}

  let h='<div class="dash">'+
    '<div class="dtop">'+
      '<div class="stat s">🔥 '+stk+'日 れんぞく</div>'+
      '<div class="stat">⭐ '+pts+' pt</div>'+
      '<div class="stat k">💡 コツ '+kotsuTotal()+'回</div>'+
      (wc>0?'<div class="stat w">🔁 ふくしゅう '+wc+'問</div>':'')+
    '</div>'+
    '<div class="lvwrap"><span class="lvbadge">Lv.'+lv+'</span><div class="lvbar"><i style="width:'+into+'%"></i></div></div>'+
    '<div class="weekrow">'+week+'</div>'+
    '</div>';

  // メインCTA
  if(goalMet){
    h+='<div class="dash" style="text-align:center;background:linear-gradient(135deg,#fff7e6,#ffeef6)">'+
       '<div style="font-size:34px">🎉</div><div style="font-weight:900;color:#d6357f;font-size:17px">今日のぶん クリア！</div>'+
       '<div style="font-size:13px;color:#888;font-weight:700;margin-top:4px">今日 '+st+'問 といたよ。えらい！</div></div>';
    h+='<button class="bigbtn sub" onclick="startOne()">もう1問やる ➕</button>';
  }else{
    h+='<button class="bigbtn" onclick="startOne()">▶ 今日の1問をやる</button>';
  }
  if(wc>0 && !goalMet){h+='<button class="bigbtn weak" onclick="startOne()">🔁 にがてを復習（'+wc+'問）</button>';}
  h+='<button class="bigbtn commute" onclick="startCommute()">🎧 通学モード（耳で1問・画面見なくてOK）</button>';
  h+='<button class="bigbtn kotsu" onclick="renderKotsu()">💡 計算のコツ図鑑（'+KOTSU.length+'こ）</button>';

  // バッジ
  h+='<div class="dash medalrow"><h3>あつめたメダル</h3><div class="medals">';
  BADGES.forEach(b=>{const has=b.f(p,stk);h+='<div class="medal '+(has?'got':'locked')+'">'+b.e+'<span class="ml">'+b.n+'</span></div>';});
  h+='</div></div>';
  view.innerHTML=h;
}

function startOne(){
  const pick=pickNext();cur=pick.q;curWeak=pick.weak;hintLevel=0;answered=false;
  addSeen(cur.id);
  renderQ();
}

function renderQ(){
  crumbs.innerHTML='<a onclick="goHome()">🏠 トップ</a> ＞ '+(curWeak?'🔁 ふくしゅう':'🎯 今日の問題');
  const c=cur;
  let h='<div class="panel">'+
    '<div class="counter"><span>'+(curWeak?'🔁 にがて復習':'🎯 チャレンジ')+'</span><span class="tag">'+c.unit+'</span></div>'+
    '<div class="card">'+
      (c.story?'<div class="qstory">'+c.story+'</div>':'')+
      '<div class="qtxt">'+c.q+'</div>'+
      '<div class="ansrow"><input id="ans" type="text" inputmode="'+(c.text?'text':'numeric')+'" autocomplete="off" placeholder="?" '+
        'onkeydown="if(event.key===\'Enter\')checkAns()">'+(c.unitlabel?'<span class="unit">'+c.unitlabel+'</span>':'')+'</div>'+
      '<div class="fb" id="fb"></div>'+
      '<div id="extra"></div>'+
      '<button class="hintbtn" id="hb" onclick="nextHint()">💡 ヒントを見る（考えてもOK）</button>'+
      '<div id="hints"></div>'+
    '</div>'+
    '<div class="btns" id="actions">'+
      '<button class="btn speak" onclick="speakQ()">🔊</button>'+
      '<button class="btn check" id="ck" onclick="checkAns()">こたえあわせ</button>'+
    '</div></div>';
  view.innerHTML=h;
  setTimeout(()=>{const a=document.getElementById('ans');if(a)a.focus();},120);
}

function nextHint(){
  if(answered)return;
  const hints=cur.hints||[];
  if(hintLevel>=hints.length){toast('ヒントはここまで！自分の力でいける💪');return;}
  const box=document.getElementById('hints');
  const labels=['ヒント①　考え方','ヒント②　しき のとちゅう','ヒント③　もうすぐ答え'];
  const div=document.createElement('div');div.className='hintbox';
  div.innerHTML='<span class="hl">'+(labels[hintLevel]||'ヒント')+'</span>'+hints[hintLevel];
  box.appendChild(div);
  hintLevel++;
  const hb=document.getElementById('hb');
  if(hintLevel>=hints.length){hb.textContent='💡 ヒントは ぜんぶ 出たよ';hb.disabled=true;hb.style.opacity=.55;}
  else hb.textContent='💡 つぎのヒント（あと'+(hints.length-hintLevel)+'こ）';
}

function norm(s){return String(s).trim().replace(/\s+/g,'').replace(/，/g,',').replace(/。/g,'').replace(/＝/g,'=').replace(/[Ａ-Ｚａ-ｚ０-９]/g,ch=>String.fromCharCode(ch.charCodeAt(0)-0xFEE0)).toLowerCase();}
function isCorrect(input,c){
  const a=norm(input);if(a==='')return false;
  const accept=[c.a].concat(c.alt||[]).map(norm);
  return accept.includes(a);
}

function checkAns(){
  if(answered)return;
  const inp=document.getElementById('ans').value;
  if(norm(inp)===''){toast('答えを入力してね✏️');return;}
  answered=true;
  const c=cur, fb=document.getElementById('fb'), extra=document.getElementById('extra');
  const ok=isCorrect(inp,c);
  document.getElementById('hb').style.display='none';
  document.getElementById('ans').disabled=true;
  if(ok){
    fb.textContent='せいかい！⭕';fb.style.color=getCol('--green');
    extra.innerHTML='<div class="okbox"><b>答え：'+c.a+'</b><br>'+(c.why||c.sol||'よくできました！')+'</div>'+tipHtml(c.id);
    markHit(c.id);
    const earn=curWeak?15:10;addPoints(earn);
    if(solvedToday()===0){recordDay(1);} // その日はじめて＝連続日数カウント
    bumpSolvedToday();
    pop();speakJa('せいかい');
  }else{
    fb.innerHTML='おしい！もう少し ❗';fb.style.color='#ff7a5b';
    extra.innerHTML='<div class="solbox"><b>正しい答え：'+c.a+'</b><br>'+(c.sol||c.why||'')+
      (c.trap?'<br><span style="color:#d6357f">⚠️ '+c.trap+'</span>':'')+'</div>'+tipHtml(c.id);
    markMiss(c.id);
    if(solvedToday()===0){recordDay(1);}
    bumpSolvedToday();
    addPoints(3); // 取り組んだだけでも少し加点（折れさせない）
  }
  const act=document.getElementById('actions');
  const kid=TIPMAP[c.id];
  let actHtml='<button class="btn speak" onclick="speakSol()">🔊</button>';
  if(ok && kid){ actHtml+='<button class="btn usekotsu" id="ukbtn" onclick="useKotsu(\''+kid+'\')">👍 コツ使えた</button>'; }
  actHtml+='<button class="btn next" onclick="afterAns()">つぎへ ▶</button>';
  act.innerHTML=actHtml;
}

function afterAns(){
  // 今日まだ「1問」目標未達なら続行を促す形、達したらホームへ戻って達成感
  renderHome();
}

// ===== 計算のコツ =====
function tipById(id){return KOTSU.find(k=>k.id===id);}
function tipHtml(qid){

  const k=tipById(kid); if(!k) return '';
  return '<div class="tipbox">'+k.emoji+' <b>ラクなやり方：'+k.title+'</b><br>'+k.easyWay+
    '<div class="tipmore" onclick="openKotsu(\''+k.id+'\')">▶ コツ図鑑でくわしく</div></div>';
}
function renderKotsu(){
  crumbs.innerHTML='<a onclick="goHome()">🏠 トップ</a> ＞ 💡 コツ図鑑';
  const cats=[]; KOTSU.forEach(k=>{if(cats.indexOf(k.category)<0)cats.push(k.category);});
  let h='<div class="panel"><div style="font-size:13px;color:#888;font-weight:700;margin-bottom:6px">計算がラクになる'+KOTSU.length+'このコツ。使うほど 🌱→⭐→🏆 に育つよ！（つかえた合計 '+kotsuTotal()+'回 / 🏆'+kotsuMasterCount()+'こ）</div>';
  cats.forEach(cat=>{
    h+='<div class="kcat">'+cat+'</div>';

         '<div style="flex:1"><div class="kt">'+k.title+(m?' <span class="mmark">'+m+'</span>':'')+'</div><div class="kh">'+k.headline+'</div></div>'+
         (c>0?'<div class="kcnt">'+c+'回</div>':'')+'</div>';

  });

function openKotsu(id){
  const k=tipById(id); if(!k){renderKotsu();return;}

      '<div class="vseasy">😆 ラク：'+k.easyWay+'</div></div>'+

// ===== コツの「使えた回数」＝マスター度 =====
function kotsuMap(){const p=pload();return p.kotsu||{};}
function kotsuCount(id){return kotsuMap()[id]||0;}
function kotsuUse(id){const p=pload();p.kotsu=p.kotsu||{};p.kotsu[id]=(p.kotsu[id]||0)+1;psave(p);return p.kotsu[id];}
function kotsuTotal(){const m=kotsuMap();let n=0;for(const k in m)n+=m[k];return n;}
function kotsuMasterCount(){const m=kotsuMap();let n=0;for(const k in m)if(m[k]>=5)n++;return n;}
function masterMark(c){return c>=5?'🏆':(c>=3?'⭐':(c>=1?'🌱':''));}
function useKotsu(kid){
  const k=tipById(kid); const c=kotsuUse(kid); addPoints(5);
  const b=document.getElementById('ukbtn'); if(b){b.outerHTML='<button class="btn done" disabled>✓ つかえた！</button>';}
  toast('✨「'+k.title+'」のコツ '+c+'回め！＋5pt'); pop();
  if(c===3) setTimeout(()=>toast('⭐「'+k.title+'」コツ⭐ゲット！'),950);
  if(c===5) setTimeout(()=>{toast('🏆「'+k.title+'」コツマスター達成！');pop();},950);
}

// ===== 通学モード（音声・画面を見なくてもOK） =====
let commute={order:[],idx:0,phase:'q',auto:false,timer:null};
function startCommute(){
  warmup(); // タップ起点で音声を有効化（iOS対策）
  commute={order:shuffleArr(BANK.map((_,i)=>i)),idx:0,phase:'q',auto:false,timer:null};
  renderCommute(); speakQ_();
}
function shuffleArr(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[a[i],a[j]]=[a[j],a[i]];}return a;}
function commuteQ(){return BANK[commute.order[commute.idx%commute.order.length]];}
// 数式を読みやすい日本語に
function toSpeech(s){
  return String(s)
    .replace(/\(-(\d+(?:\.\d+)?)\)/g,'マイナス$1').replace(/\(\+(\d+(?:\.\d+)?)\)/g,'プラス$1') // (-3)→マイナス3
    .replace(/cm³/g,'立方センチ').replace(/cm²/g,'平方センチ').replace(/cm/g,'センチ')
    .replace(/(\d)³/g,'$1の3乗').replace(/(\d)²/g,'$1の2乗')
    .replace(/×/g,' かける ').replace(/÷/g,' わる ')
    .replace(/＝|=/g,' は ').replace(/\?|？/g,' いくつ')
    .replace(/\s\+\s|\+/g,' たす ')
    .replace(/\s-\s/g,' ひく ')   // スペースつきの - は引き算
    .replace(/-/g,'マイナス')     // のこりの - は負の符号
    .replace(/x/g,'エックス').replace(/y/g,'ワイ').replace(/\ba\b/g,'エー')
    .replace(/[（）()]/g,'')
    .replace(/\s+/g,' ').trim();
}
function speakQ_(){const q=commuteQ();speakJa((q.story?q.story+'。':'')+toSpeech(q.q));}
function speakA_(){const q=commuteQ();speakJa('こたえは、'+toSpeech(q.a));}
function renderCommute(){
  crumbs.innerHTML='<a onclick="stopCommute()">🏠 トップ</a> ＞ 🎧 通学モード';
  const q=commuteQ();
  view.innerHTML='<div class="panel commute">'+
    '<div class="counter"><span>🎧 通学モード</span><span class="tag">'+q.unit+'</span></div>'+
    '<div class="ccard"><div class="cnum">'+(commute.idx+1)+'問目</div>'+
      '<div class="cq">'+(q.story?q.story+'<br>':'')+q.q+'</div>'+
      '<div class="ca" id="ca" style="display:none">こたえ：'+q.a+'</div></div>'+
    '<div class="cbtns">'+
      '<button class="btn speak" onclick="speakQ_()">🔊 もう一回</button>'+
      '<button class="btn flip" onclick="revealA()">💡 答えを聞く</button>'+
      '<button class="btn next" onclick="nextCommute()">▶ つぎ</button>'+
    '</div>'+
    '<button class="autobtn'+(commute.auto?' on':'')+'" onclick="toggleAuto()">'+(commute.auto?'⏸ オート再生中…止める':'▶ オート再生（耳だけでOK）')+'</button>'+
    '<div class="chelp">画面を見なくても大丈夫。問題→考える→答え、の声が流れるよ。電車の中でどうぞ🚃</div>'+
    '<div class="btns"><button class="backbtn" onclick="stopCommute()">やめる</button></div></div>';
}
function revealA(){const ca=document.getElementById('ca');if(ca)ca.style.display='block';speakA_();
  // 答えまで聞いたら「やった」記録（連続日数キープ・採点はしない）
  if(commute.phase!=='done'){commute.phase='done';if(solvedToday()===0)recordDay(1);bumpSolvedToday();addPoints(3);}}
function nextCommute(){commute.idx++;commute.phase='q';renderCommute();speakQ_();}
function toggleAuto(){commute.auto=!commute.auto;if(commute.auto)autoLoop();else clearTimeout(commute.timer);renderCommute();}
function autoLoop(){ // 問題→(間)→答え→(間)→次 を自動で
  speakQ_(); commute.phase='q';
  commute.timer=setTimeout(()=>{ if(!commute.auto)return; revealA();
    commute.timer=setTimeout(()=>{ if(!commute.auto)return; nextCommuteAuto(); },4500);
  },7000);
}
function nextCommuteAuto(){commute.idx++;renderCommute();if(commute.auto)autoLoop();}
function stopCommute(){commute.auto=false;clearTimeout(commute.timer);if(window.speechSynthesis)speechSynthesis.cancel();renderHome();}

// ----- 読み上げ -----
let warmed=false;
function warmup(){if(warmed||!window.speechSynthesis)return;try{const u=new SpeechSynthesisUtterance(' ');u.volume=0;speechSynthesis.speak(u);}catch(e){}warmed=true;}
function speakJa(t){if(!window.speechSynthesis)return;warmup();speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(t);u.lang='ja-JP';u.rate=.95;speechSynthesis.speak(u);}
function speakQ(){speakJa((cur.story?cur.story+'。':'')+cur.q.replace(/<[^>]+>/g,''));}
function speakSol(){speakJa((cur.sol||cur.why||'').replace(/<[^>]+>/g,''));}

  let t=0;(function fr(){ctx.clearRect(0,0,cv.width,cv.height);ps.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.4;ctx.fillStyle=p.c;ctx.fillRect(p.x,p.y,p.r,p.r);});if(++t<70)requestAnimationFrame(fr);else ctx.clearRect(0,0,cv.width,cv.height);})();}

const KOTSU=[{"id":"k1","category":"正負の数の符号と暗算","emoji":"➕","title":"同じ符号どうしは、たしてその符号","headline":"符号が同じなら、数だけたして符号はそのまま","when":"+と+、−と−のように、符号が同じ2つの数をたすとき","idea":"符号が同じなら『なかま』。数の部分だけそのままたして、共通の符号を前につけるだけ。マイナスどうしなら答えもマイナス、プラスどうしなら答えもプラスだよ。","hardWay":"(−7)+(−5) を数直線で考える。0から左へ7、そこからさらに左へ5。−8、−9…と1つずつ数えて −12。手間がかかる。","easyWay":"どちらも−で符号が同じ。数だけ 7+5=12 として、共通の−をつけて −12。一発で出る。","example":"(−7)+(−5)=−12","units":["正負の数"],"problem_ids":[]},{"id":"k2","category":"正負の数の符号と暗算","emoji":"⚖️","title":"符号がちがうときは、大きい方から小さい方を引く","headline":"差をとって、大きい方の符号をつける","when":"+と−のように、符号がちがう2つの数をたすとき","idea":"符号がちがう数は『つな引き』。数が大きい方の符号が勝つ。だから(大きい数)−(小さい数)を計算して、勝った方の符号をつけるだけ。","hardWay":"8+(−13) を数直線で。0から右へ8、そこから左へ13。13回も数えてやっと −5。数えまちがえやすい。","easyWay":"数は13と8。大きいのは13で符号は−。だから 13−8=5 として、勝った−をつけて −5。","example":"8+(−13)=−5","units":["正負の数"],"problem_ids":[]},{"id":"k3","category":"正負の数の符号と暗算","emoji":"✖️","title":"かけ算・わり算は、マイナスの数で符号が決まる","headline":"マイナスが偶数個なら+、奇数個なら−","when":"かけ算・わり算で、マイナスがいくつもまざっているとき","idea":"符号は最後にまとめて決めよう。マイナスの数をかぞえて、偶数個(0,2,4…)なら答えは+、奇数個(1,3,5…)なら答えは−。数の部分は符号を気にせず先にかけてOK。","hardWay":"(−2)×(−3)×(−4) を前から。(−2)×(−3)=+6、6×(−4)=−24。毎回符号を考えて混乱しやすい。","easyWay":"数だけ先に 2×3×4=24。マイナスは3個=奇数個だから符号は−。よって −24。符号を考えるのは1回だけ。","example":"(−2)×(−3)×(−4)=−24","units":["正負の数"],"problem_ids":[]},{"id":"k4","category":"正負の数の符号と暗算","emoji":"🔄","title":"マイナスのマイナスは、プラス","headline":"−(−■) は +■ に書きかえる","when":"−のうしろにマイナスの数がくっついているとき(−(−■)の形)","idea":"『マイナスのマイナスはプラス』。−(−4)は +4 と書きかえてOK。引くと書いてあっても、相手がマイナスなら結局たすことになるんだ。","hardWay":"6−(−4) を『引く』と思い込んで 6−4=2 としてしまいがち。でもこれはまちがい。","easyWay":"−(−4) を +4 に書きかえると 6+4=10。マイナス2個はプラス、と覚えればすぐ直せる。","example":"6−(−4)=10","units":["正負の数"],"problem_ids":[]},{"id":"k5","category":"正負の数の符号と暗算","emoji":"🔁","title":"ひき算は『+反対の数』に直す","headline":"−■ を +(■の反対の数)にすれば全部たし算","when":"ひき算が出てきて、符号でこんがらがりそうなとき","idea":"ひき算は全部たし算に変身できる。『−■』は『+(■の反対の数)』に直そう。そうすれば全部たし算になって、同符号・異符号のコツが使えるよ。","hardWay":"(−3)−8 をそのまま引こうとすると、マイナスからさらに引く形で頭が混乱する。","easyWay":"引く数8の反対は−8だから (−3)−8=(−3)+(−8)。どちらも−で同じだから 3+8=11、符号は−で −11。","example":"(−3)−8=−11","units":["正負の数"],"problem_ids":[]},{"id":"k6","category":"正負の数の符号と暗算","emoji":"⚠️","title":"−3² と (−3)² を見分ける","headline":"カッコがあるかないかで符号が変わる","when":"マイナスのついた数の2乗・累乗が出てきたとき","idea":"カッコがあるかないかで意味が変わる。(−3)²は『−3を2回かける』で+になる。−3²はカッコがないから『3を2回かけて最後に−をつける』で−のまま。カッコがマイナスを巻き込むかどうかがカギ。","hardWay":"−3² と (−3)² を同じと思って、どちらも 9 と答えてしまう。よくある罠でばつになりやすい。","easyWay":"カッコを見る。(−3)²はマイナスもいっしょに2乗で (−3)×(−3)=9。−3²は3だけ2乗で −(3×3)=−9。別物だよ。","example":"−3²=−9、(−3)²=9","units":["正負の数"],"problem_ids":[]},{"id":"k7","category":"かけ算・わり算をラクに","emoji":"🖐️","title":"×5は『×10して半分』","headline":"5は10の半分。0をつけて2で割る","when":"5をかけるかけ算が出てきたとき","idea":"5は10の半分。だから『10をかけてから半分にする』のと同じ。10をかけるのは0をつけるだけだからすごくラクだよ。","hardWay":"86×5 を筆算。6×5=30で0を書いて3くり上げ、8×5=40に3で43。答え430。くり上がりが面倒。","easyWay":"86×5 → ×10で 860、÷2して 430。0をつけて半分にするだけ。","example":"86×5=430","units":["正負の数","文字式","空間図形"],"problem_ids":[]},{"id":"k8","category":"かけ算・わり算をラクに","emoji":"🍀","title":"×25は『×100して4で割る』","headline":"25は100の4分の1","when":"25をかけるとき(時間や面積でよく出る)","idea":"25は100の4分の1。だから『100をかけて4で割る』のと同じ。100倍は00をつけるだけだよ。","hardWay":"32×25 を筆算。32×5=160、32×20=640、たして800。2段の筆算でミスしやすい。","easyWay":"32×25 → ×100で 3200、÷4して 800。00をつけて4で割るだけ。","example":"32×25=800","units":["正負の数","平面図形"],"problem_ids":[]},{"id":"k9","category":"かけ算・わり算をラクに","emoji":"➖","title":"×9や×99は『キリの数にして引く』","headline":"99は100より1少ない。100倍して1回ぶん引く","when":"9, 99, 19 など『キリの数より1少ない数』をかけるとき","idea":"99は100より1小さい。だから『100をかけてから、その数を1回ぶん引く』とラク。9なら×10して1回ぶん引くよ。","hardWay":"8×99 を筆算。8×9=72で2を書いて7くり上げ、8×9=72に7で79、答え792。2けたのかけ算が手間。","easyWay":"8×99 → 8×100=800、そこから8を引いて 792。","example":"8×99=792","units":["正負の数","文字式"],"problem_ids":[]},{"id":"k10","category":"かけ算・わり算をラクに","emoji":"📦","title":"大きい数はバラして暗算","headline":"102を『100と2』に分けてかける","when":"102や98のような『キリの数に近い数』をかけるとき","idea":"102を『100と2』に分けて、それぞれにかけて最後にたす。大きい数を分けると暗算でできるよ。","hardWay":"6×102 を筆算。6×2=12で2を書いて1くり上げ、6×0=0に1で1、6×1=6、答え612。","easyWay":"6×102 → 6×100=600 と 6×2=12 に分けて、600+12=612。","example":"6×102=612","units":["文字式","正負の数"],"problem_ids":[]},{"id":"k11","category":"かけ算・わり算をラクに","emoji":"✂️","title":"分数のかけわり算は、先に約分","headline":"小さい数にしてから計算するとラク","when":"かけ算とわり算がまざった分数の計算のとき","idea":"かけてから大きい数で割ると大変。先に上と下で約分して数を小さくしてから計算すると、ラクで間違えにくいよ。","hardWay":"14×15÷21 → 先に14×15=210、それを÷21して10。210という大きい数を作ってしまう。","easyWay":"14と21を7で約分して2と3に。2×15÷3=30÷3=10。小さい数で計算できる。","example":"14×15÷21=10","units":["正負の数","比例と反比例"],"problem_ids":[]},{"id":"k12","category":"かけ算・わり算をラクに","emoji":"0️⃣","title":"0(ゼロ)は後でまとめてつける","headline":"0を消して計算、あとで全部つける","when":"30×400 のように後ろに0がついた数どうしのかけ算","idea":"0をいったん消して、前の数字だけでかけ算する。そのあと、消した0を全部まとめて後ろにつけるだけだよ。","hardWay":"30×400 を筆算。0を全部書きながら計算し、0の数をかぞえながら12000にする。0の数で混乱しやすい。","easyWay":"0を消して 3×4=12。消した0は合計3個だから 12 のうしろに000をつけて 12000。","example":"30×400=12000","units":["正負の数","比例と反比例"],"problem_ids":[]},{"id":"k13","category":"たし算・ひき算をラクに","emoji":"💯","title":"キリのいい数にしてから直す(たし算)","headline":"98は100とみて、あとで2を引く","when":"98や99のような、キリのいい数にもう少しでとどく数をたすとき","idea":"98は『100より2小さい』。だから先に100をたしておいて、あとで多くたした2を引けばラク。キリのいい100は計算がかんたんだよ。","hardWay":"98+47を筆算。8+7=15で5を書いて1くり上げ、9+4=13に1で14。答え145。くり上がりが多い。","easyWay":"98を100とみて 100+47=147。多くたした2を引いて 145。","example":"98+47=145","units":["正負の数"],"problem_ids":[]},{"id":"k14","category":"たし算・ひき算をラクに","emoji":"🔙","title":"キリのいい数にしてから直す(ひき算)","headline":"19は20とみて、あとで1をたす","when":"19や28のような、キリのいい数にもう少しでとどく数を引くとき","idea":"19は『20より1小さい』。だから先に20を引いて、引きすぎた1をたしてもどす。キリのいい20を引くのはかんたんだよ。","hardWay":"52−19を筆算。2から9が引けず十の位から1くり下げて12−9=3、十の位は4−1=3。答え33。くり下がりが面倒。","easyWay":"19を20とみて 52−20=32。引きすぎた1をたして 33。","example":"52−19=33","units":["正負の数"],"problem_ids":[]},{"id":"k15","category":"たし算・ひき算をラクに","emoji":"🔟","title":"先に10を作ってからたす","headline":"たす数を『10にする分』と『のこり』に分ける","when":"一の位どうしをたすと10をこえる、くり上がりのたし算のとき","idea":"たす数を『10にするための分』と『のこり』に分ける。まず10を作ってから、のこりをたすと考えやすいよ。","hardWay":"8+5を指で数える。8の次から9,10,11,12,13と5つ。数えまちがえるとずれる。","easyWay":"8はあと2で10。5を『2とのこり3』に分けて、8+2=10、10+3=13。","example":"8+5=13","units":["正負の数"],"problem_ids":[]},{"id":"k16","category":"たし算・ひき算をラクに","emoji":"💴","title":"おつりは999から引く","headline":"1000は999とみればくり下がりゼロ","when":"1000円や100円を出したときのおつりなど、0が多い数から引くとき","idea":"1000を『999＋1』とみる。999から引くとくり下がりが1回も起きないからラク。最後に1をたしてもどそう。","hardWay":"1000−680を筆算。上のくらいから次々くり下げないといけなくてミスのもと。答え320。","easyWay":"1000を999とみて 999−680=319。さいごに1をたして 320。","example":"1000−680=320","units":["正負の数"],"problem_ids":[]},{"id":"k17","category":"一次方程式を速く解く","emoji":"🔀","title":"移項は『符号チェンジ』","headline":"反対側へ動かすときは+−を入れかえる","when":"『+5』や『−3』が文字とまざっている数を、反対側にうつしたいとき","idea":"両がわから同じ数を引く…の代わりに、反対がわへ符号(+−)を入れかえてポンとうつすだけ。やってることは同じだけど、書く手間が半分になるよ。","hardWay":"3x+5=14 を、両辺から5を引く。3x+5−5=14−5 → 3x=9 → 両辺を3で割って x=3。","easyWay":"『+5』を右へうつすと符号がかわって−5。3x=14−5 → 3x=9 → x=3。","example":"3x+5=14 → x=3","units":["一次方程式"],"problem_ids":[]},{"id":"k18","category":"一次方程式を速く解く","emoji":"🏠","title":"文字は左、数は右へお引っこし","headline":"おうちを分けて、うつすときは符号チェンジ","when":"両がわに文字(x)があるとき。例 5x−3=2x+9","idea":"『文字は左、数は右』とおうちを分けてあげよう。うつすときは移項だから符号チェンジ。さいごに左右をまとめればシンプルな形になるよ。","hardWay":"5x−3=2x+9。両辺から2xを引き、両辺に3をたす。5x−2x=9+3 → 3x=12 → x=4。","easyWay":"文字を左・数を右へお引っこし(符号チェンジ)。5x−2x=9+3 → 3x=12 → x=4。","example":"5x−3=2x+9 → x=4","units":["一次方程式"],"problem_ids":[]},{"id":"k19","category":"一次方程式を速く解く","emoji":"👑","title":"わり算はラスボス(最後)","headline":"先に割ると分数地獄。割るのは最後","when":"xの前に数(係数)がついているとき","idea":"先に割ると分数が出てきてグチャグチャ。まず移項で『○x=△』のスッキリ形にしてから、最後に係数で割る。これだけで計算ミスがグッと減るよ。","hardWay":"3x−2=10。あせって先に3で割ると x−2/3=10/3 となり分数だらけで大変。","easyWay":"先に−2を右へ移項。3x=10+2 → 3x=12 → 最後に3で割って x=4。","example":"3x−2=10 → x=4","units":["一次方程式"],"problem_ids":[]},{"id":"k20","category":"一次方程式を速く解く","emoji":"🧹","title":"分数は『分母の最小公倍数』をかけて消す","headline":"両辺にかければ分数が全部消える","when":"式の中に分数があるとき。例 x/2 + 1/3 = 5/6","idea":"分母 2・3・6 の最小公倍数6を両辺ぜんぶにかけると、分数が全部消えて整数の式になる。分数の計算をしなくてよくなるから一気にラクだよ。","hardWay":"x/2 + 1/3 = 5/6。通分しながら x/2 = 5/6 − 2/6 = 3/6 → x=1。通分が多くてミスしやすい。","easyWay":"両辺に6をかける。3x+2=5 → 3x=3 → x=1。","example":"x/2 + 1/3 = 5/6 → x=1","units":["一次方程式"],"problem_ids":[]},{"id":"k21","category":"一次方程式を速く解く","emoji":"🔢","title":"小数は10倍してスッキリ","headline":"全部の項に同じ数をかけて整数にする","when":"式の中に小数があるとき。例 0.3x−0.5=0.7","idea":"小数のままだと計算がこわい。小数第1位までなら両辺を10倍(第2位までなら100倍)すると全部整数になる。このとき式の中のすべての項に同じ数をかけるのがコツ。整数の項も忘れずにかけよう。","hardWay":"0.3x−0.5=0.7。小数のまま 0.3x=1.2 → x=1.2÷0.3。小数のわり算でつまずきやすい。","easyWay":"両辺を10倍して 3x−5=7 → 3x=12 → x=4。","example":"0.3x−0.5=0.7 → x=4","units":["一次方程式"],"problem_ids":[]},{"id":"k22","category":"一次方程式を速く解く","emoji":"✅","title":"答えは『代入』で答え合わせ","headline":"xを入れて左と右が同じなら正解","when":"解き終わったあと、合っているか不安なとき","idea":"出した答えを、もとの式のxにそのまま入れてみよう。左がわと右がわが同じ数になれば大正解。まちがいに自分で気づけるから点数が安定するよ。","hardWay":"2x+3=11 を解いて x=4。でも本当に合ってる?と不安なまま次へ進んでしまう。","easyWay":"x=4 をもとの式に代入。2×4+3=11。右がわの11とピッタリ同じだから正解。","example":"2x+3=11 → x=4(2×4+3=11 ◯)","units":["一次方程式"],"problem_ids":[]},{"id":"k23","category":"文字式の整理","emoji":"🍎","title":"同じ文字は、係数だけたし算","headline":"文字はそのまま、前の数だけ計算","when":"おなじ文字どうし(xとx、aとa)を整理するとき","idea":"おなじ文字は『なかま』。文字はそのままで、前の数(係数)だけたしたり引いたりすればOK。リンゴ3個＋リンゴ5個＝リンゴ8個、とおなじ考えだよ。","hardWay":"3x+5x を、xがいくつ集まるか1つずつ数えて8個ぶん。だから 8x。","easyWay":"文字はxのまま。前の数だけ 3+5=8。文字xをつけて 8x。","example":"3x+5x=8x","units":["文字式"],"problem_ids":[]},{"id":"k24","category":"文字式の整理","emoji":"🗂️","title":"文字と数は、別グループでまとめる","headline":"xのなかまと、ただの数のなかまに分ける","when":"文字の項と数だけの項がまざっている式を整理するとき","idea":"『xのなかま』と『ただの数のなかま』を分けて、それぞれでまとめよう。ちがう種類はたせないから、むりにくっつけないのがコツだよ。","hardWay":"4x+3+2x+5 を左から見て、xの項と数の項を探して二手間かけて整理する。","easyWay":"xグループ→4x+2x=6x、数グループ→3+5=8。ならべて 6x+8。これ以上はまとまらない。","example":"4x+3+2x+5=6x+8","units":["文字式"],"problem_ids":[]},{"id":"k25","category":"文字式の整理","emoji":"💉","title":"代入はカッコをつけてから","headline":"( )にしてから数を入れると符号ミスゼロ","when":"x=−3 などマイナスの数を式に入れて計算するとき","idea":"文字のところを( )にしてから数を入れると、符号のミスがなくなるよ。とくにマイナスのときは『カッコにしてから』が安全。","hardWay":"2x+1 に x=−3 を、カッコなしで 2×−3+1 と書くと符号がこんがらがって 2−3+1=0 などとしやすい。","easyWay":"まず 2×( )+1 とカッコをあけて−3を入れる。2×(−3)+1=−6+1=−5。","example":"x=−3のとき 2x+1=−5","units":["文字式","正負の数"],"problem_ids":[]},{"id":"k26","category":"文字式の整理","emoji":"📤","title":"マイナスのカッコは、中身ぜんぶ反対","headline":"−( )を外すときは全部の符号を変える","when":"6x−(2x−5) のようにカッコの前がマイナスのとき","idea":"マイナスがついたカッコを外すときは、中の符号を全部反対にするよ。1つだけ変えて他を忘れる、がいちばん多いミス。『ぜんぶ配る』が合言葉。","hardWay":"6x−(2x−5) で−を2xにだけ配って 6x−2x−5=4x−5 としてしまう(−5を変え忘れるミス)。","easyWay":"−を中身ぜんぶに配る。−(2x−5)=−2x+5。よって 6x−2x+5=4x+5。","example":"6x−(2x−5)=4x+5","units":["文字式"],"problem_ids":[]},{"id":"k27","category":"割合・平均・データ","emoji":"✖️","title":"『の』はかけ算のサイン","headline":"『□の△%』は □×△ で式にできる","when":"『□の△%』『□の何分のいくつ』を計算するとき","idea":"日本語の『の』は、かけ算(×)のサイン。『800円の15%』は『800×0.15』とそのまま式にできるよ。","hardWay":"800円の15%。『15%って800をどう使うの?』と迷い、800÷100×15と遠回り。","easyWay":"『の』を×にするだけ。15%=0.15だから 800×0.15=120。","example":"800×0.15=120","units":["割合・平均・データ","データの活用"],"problem_ids":[]},{"id":"k28","category":"割合・平均・データ","emoji":"➗","title":"%は÷100、もどすは×100","headline":"小数点を2つずらすだけ","when":"百分率(%)と小数を行き来するとき","idea":"%を小数にするには100で割る(小数点を左へ2つ)。小数を%にもどすには100をかける(右へ2つ)。点が2つ動くだけだよ。","hardWay":"37%を小数に。分数37/100を作って 37÷100 を筆算して 0.37。","easyWay":"%は÷100。37%→小数点を左に2つで 0.37。逆に0.24は×100で 24%。","example":"37÷100=0.37","units":["割合・平均・データ","データの活用"],"problem_ids":[]},{"id":"k29","category":"割合・平均・データ","emoji":"🎯","title":"仮平均でラクに平均","headline":"だいたいの数を決めて、差だけ平均する","when":"大きい数や、近い数がならぶデータの平均を出すとき","idea":"だいたいの数(仮平均)を決め、そこからの差だけをたす。差は小さい数になるから計算がラク。最後に仮平均にもどそう。","hardWay":"78,85,82,90,75の平均。全部たして410、410÷5=82。大きいたし算が大変。","easyWay":"仮平均を80に。差は−2,+5,+2,+10,−5で合計+10。10÷5=2。80+2=82。","example":"80+(−2+5+2+10−5)÷5=82","units":["割合・平均・データ","データの活用"],"problem_ids":[]},{"id":"k30","category":"割合・平均・データ","emoji":"📊","title":"相対度数＝部分÷全体","headline":"その人数を全部の人数で割るだけ","when":"『相対度数』を求めるとき","idea":"相対度数は『その階級の人数 ÷ 全部の人数』。全体を1とみたときの割合だから、わり算1回で出る。全部たすとちょうど1になるよ。","hardWay":"全体40人中9人。%で 9÷40×100=22.5% を出し、さらに÷100して0.225と二度手間。","easyWay":"部分÷全体で 9÷40=0.225。これがそのまま相対度数(%にしたいときだけ×100)。","example":"9÷40=0.225","units":["割合・平均・データ","データの活用"],"problem_ids":[]},{"id":"k31","category":"割合・平均・データ","emoji":"🎢","title":"中央値は、並べてまん中","headline":"小さい順に並べてからまん中を見る","when":"中央値(メジアン)を求めるとき","idea":"まず小さい順に並べる。数が奇数ならど真ん中の1つ。偶数ならまん中2つの平均(たして÷2)。並べるのが先だよ。","hardWay":"6,10,4,8の中央値。並べずに『平均かな?』と全部たして28÷4=7としてしまう(取りちがえ)。","easyWay":"小さい順に 4,6,8,10。4個だからまん中2つ6と8の平均で (6+8)÷2=7。","example":"(6+8)÷2=7","units":["割合・平均・データ","データの活用"],"problem_ids":[]},{"id":"k32","category":"図形と単位","emoji":"📐","title":"柱の体積は『底面積×高さ』だけ","headline":"床の広さに高さをかけるだけ","when":"四角柱・三角柱・円柱など『柱』の体積を求めるとき","idea":"柱はおなじ形の床(底面)を上にずーっと積み上げた形。だから『床の広さ(底面積)』に『高さ』をかけるだけ。横の面の数や周りの長さは体積には関係ないよ。","hardWay":"三角柱で、横の長方形の面積などを足してしまい、体積なのか表面積なのか分からなくなる。","easyWay":"底面積=三角形=(4×3)÷2=6。あとは高さ10をかけて 体積=6×10=60。これで終わり。","example":"(4×3÷2)×10=60","units":["空間図形","平面図形"],"problem_ids":[]},{"id":"k33","category":"図形と単位","emoji":"🎲","title":"立方体は『同じ数を3回』","headline":"1辺を3回かける。2回だと面積","when":"立方体(サイコロの形)の体積を出すとき","idea":"立方体はたて・よこ・高さがぜんぶ同じ長さ。だから1辺の数を3回かけるだけ。2回しかかけないと『面積』になっちゃうから、回数に注意だよ。","hardWay":"1辺4cm。底面積16を出してから高さ4をかける2ステップで、どこかで4を1回かけ忘れて32などにしてしまう。","easyWay":"『同じ数3回』と覚える。4×4×4=64。指を3本立てて『4を3回』と数えれば回数ミスなし。","example":"4×4×4=64","units":["空間図形"],"problem_ids":[]},{"id":"k34","category":"図形と単位","emoji":"🔲","title":"まわりはたし算、面積はかけ算","headline":"²がついたらかけ算、と覚える","when":"長方形で『まわりの長さ』と『面積』を取りちがえそうなとき","idea":"まわりの長さは辺をぐるっと一周『たす』もの(単位はcm)。面積は中のマス目の数で『かける』もの(単位はcm²)。求めるものの単位を先に決めると混ざらないよ。","hardWay":"たて5・よこ3で、まわりを聞かれているのに面積5×3=15と答えてしまう取りちがえが起きる。","easyWay":"単位で見分ける。まわり(cm)なら全部たして (5+3)×2=16。面積(cm²)ならかけて 5×3=15。","example":"まわり=(5+3)×2=16、面積=5×3=15","units":["平面図形"],"problem_ids":[]},{"id":"k35","category":"図形と単位","emoji":"📏","title":"単位は計算の前にそろえる","headline":"mとcmがまざったら、先にそろえる","when":"mとcmなど、長さの単位がまざっている図形の問題","idea":"単位がちがう数はそのままかけてはダメ。先にどちらかにそろえてから計算しよう。とくに面積はm²とcm²で数がすごく変わるから、計算する前にそろえるのが安全。","hardWay":"たて2m・よこ3mで、片方だけcmにして 2m×300cm のように混乱する。","easyWay":"先にそろえる。2m=200cm、3m=300cm なら 200×300=60000cm²。m²で答えるなら 2×3=6m²。","example":"200×300=60000(cm²)、または 2×3=6(m²)","units":["平面図形","空間図形"],"problem_ids":[]},{"id":"k36","category":"図形と単位","emoji":"📐","title":"三角形の残りの角は『180から引く』","headline":"内角の和は180°。だから引けば出る","when":"三角形の角度を1つ求めるとき(2つの角が分かっている)","idea":"三角形の中の3つの角を全部たすと必ず180°。だから残り1つは『180から分かっている2つを引く』だけで出る。たして180になるか確かめもできるよ。","hardWay":"2つの角が65°と70°。残りの角を図をにらんで当てずっぽうで45°くらいかな…と勘で答えて自信が持てない。","easyWay":"180から2つ引く。180−65−70=45°。検算は65+70+45=180でピッタリ。","example":"180−65−70=45","units":["平面図形"],"problem_ids":[]},{"id":"k37","category":"ケアレスミス回避と検算","emoji":"⭐","title":"×÷は+−より先に計算","headline":"式を見たら、まず×÷に丸をつける","when":"+−と×÷がまざった式を見たとき","idea":"式は左から順番じゃなくて、×と÷を先にやるのがルール。先に+−をしちゃうのが一番多いミス。式を見たら、まず×÷に丸をつけて先に片づけるといいよ。","hardWay":"12−8÷2 を左から 12−8=4、4÷2=2。これはルール違反でまちがい。","easyWay":"先に÷を計算。8÷2=4。次に 12−4=8。丸つけした÷から片づければ正解。","example":"12−8÷2=8","units":["正負の数","文字式"],"problem_ids":[]},{"id":"k38","category":"ケアレスミス回避と検算","emoji":"🔭","title":"概算で答えの当たりをつける","headline":"キリのいい数で予想してから本番","when":"かけ算の答えが合ってるか不安なとき","idea":"キリのいい数にざっくり直して、だいたいの大きさを先に予想しておこう。本当の答えがその近くにならなかったら、どこかでミスしてるサインだよ。","hardWay":"19×21 を筆算で 399。でも本当に合ってるか自信がない。","easyWay":"19を20、21を20とみて 20×20=400 と予想。答え399は近いからOK。39や3990なら桁ミスとすぐ気づける。","example":"19×21=399(予想400)","units":["正負の数","比例と反比例"],"problem_ids":[]},{"id":"k39","category":"ケアレスミス回避と検算","emoji":"👉","title":"符号は最後に指さし確認","headline":"マイナスを1個落とすのが一番多いミス","when":"マイナスがまざった足し引きのあと","idea":"答えを出したら、各項のマイナスを指でさして数え直そう。途中でマイナスを1個落とすのが一番多いミス。最後にもう一度プラスかマイナスかだけ見るんだ。","hardWay":"−3+5−8 で−8のマイナスを落として 3+5−8=0 としてしまう。符号を1個見落としたまちがい。","easyWay":"符号を1個ずつ指さし。(−3)+(+5)+(−8)。プラスは5、マイナスは3と8で11。5−11=−6。","example":"−3+5−8=−6","units":["正負の数"],"problem_ids":[]},{"id":"k40","category":"ケアレスミス回避と検算","emoji":"🔍","title":"文字式は『数を入れて』確かめる","headline":"計算前と後の式が同じ答えなら正しい","when":"文字式を計算してまとめたあと","idea":"自分で簡単な数を文字に入れて、計算前の式と計算後の式が同じ答えになるか比べてみよう。同じならまとめ方が正しい。書き写しミスもここで見つかるよ。","hardWay":"2a+3b を a=2, b=−1 で計算したいが、bのマイナスを忘れて 2×2+3×1=7 としてしまう。","easyWay":"符号ごと代入。2×2+3×(−1)=4+(−3)=1。bがマイナスのときはちゃんと引くと確認できる。","example":"a=2, b=−1のとき 2a+3b=1","units":["文字式","正負の数"],"problem_ids":[]}];
